<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Triage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }

    /* Header */
    header { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1.5rem; background: #16213e; border-bottom: 1px solid #0f3460; }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    #group-select { padding: 0.4rem 0.8rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; font-size: 0.9rem; }
    /* Custom folder dropdown */
    #folder-dropdown { position: relative; }
    #folder-btn { padding: 0.4rem 0.8rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; font-size: 0.9rem; cursor: pointer; min-width: 200px; text-align: left; white-space: nowrap; }
    #folder-btn:hover { background: #533483; }
    #folder-btn::after { content: ' \25BE'; }
    /* (folder-list styles are in the tree dropdown section below) */
    #filter-rating { padding: 0.4rem 0.8rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; font-size: 0.9rem; }
    #filter-tag { padding: 0.4rem 0.8rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; font-size: 0.9rem; }
    .photo-count { font-size: 0.85rem; color: #aaa; margin-left: auto; }

    /* Grid */
    #photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(256px, 1fr)); gap: 0.5rem; padding: 1rem; }
    .photo-card { position: relative; cursor: pointer; border-radius: 4px; overflow: hidden; background: #0f3460; }
    .photo-card img { width: 100%; height: 256px; object-fit: cover; display: block; }
    .photo-card .rating-badge { position: absolute; top: 6px; right: 6px; padding: 2px 8px; border-radius: 3px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
    .rating-keep { background: #27ae60; }
    .rating-duplicate { background: #e67e22; }
    .rating-skip { background: #c0392b; }
    .photo-card .folder-badge { position: absolute; bottom: 6px; left: 6px; padding: 2px 6px; background: rgba(0,0,0,0.7); border-radius: 3px; font-size: 0.65rem; color: #ccc; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .photo-card:hover { outline: 2px solid #533483; }

    /* Detail modal */
    #detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; overflow-y: auto; }
    #detail-overlay.active { display: flex; justify-content: center; align-items: flex-start; padding: 2rem; gap: 1rem; }
    #detail-panel { background: #16213e; border-radius: 8px; max-width: 900px; width: 100%; padding: 1.5rem; }
    #people-sidebar { background: #16213e; border-radius: 8px; width: 240px; min-width: 240px; padding: 1rem; position: sticky; top: 2rem; max-height: calc(100vh - 4rem); overflow-y: auto; }
    #people-sidebar h4 { margin: 0 0 0.75rem; font-size: 0.95rem; color: #aaa; }
    .people-list { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.75rem; }
    .people-list .person-row { display: flex; align-items: center; justify-content: space-between; padding: 0.3rem 0.5rem; background: #0f3460; border-radius: 4px; font-size: 0.85rem; }
    .people-list .person-row button { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 0.9rem; padding: 0 0.3rem; }
    .people-list .person-row button:hover { color: #e74c3c; }
    .sidebar-combo { position: relative; }
    .sidebar-combo input { width: 100%; padding: 0.3rem 0.5rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; font-size: 0.8rem; }
    .sidebar-combo .combo-matches { position: absolute; left: 0; right: 0; top: 100%; background: #0f3460; border: 1px solid #533483; border-top: none; border-radius: 0 0 4px 4px; max-height: 150px; overflow-y: auto; z-index: 10; display: none; }
    .sidebar-combo .combo-matches.open { display: block; }
    .sidebar-combo .combo-match { padding: 0.3rem 0.5rem; cursor: pointer; font-size: 0.8rem; }
    .sidebar-combo .combo-match:hover { background: #533483; }
    .sidebar-combo .combo-create { padding: 0.3rem 0.5rem; cursor: pointer; font-size: 0.8rem; color: #27ae60; border-top: 1px solid #533483; }
    .sidebar-combo .combo-create:hover { background: #533483; }
    #detail-panel img { max-width: 100%; max-height: 512px; object-fit: contain; display: block; margin: 0 auto 1rem; border-radius: 4px; }
    #detail-panel h3 { margin-bottom: 1rem; font-size: 1rem; color: #aaa; }

    /* Caption */
    .caption-section { margin-bottom: 1rem; }
    .caption-section textarea { width: 100%; padding: 0.5rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; resize: vertical; min-height: 60px; font-family: inherit; }
    .caption-section button { margin-top: 0.4rem; padding: 0.4rem 1rem; background: #533483; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .caption-section button:hover { background: #6c44a0; }

    /* Rating */
    .rating-section { margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center; }
    .rating-section button { padding: 0.4rem 1rem; border: 1px solid #533483; background: transparent; color: #eee; border-radius: 4px; cursor: pointer; }
    .rating-section button.active { background: #533483; font-weight: 600; }
    .rating-section button:hover { background: #533483; }

    /* Tags */
    .tags-section { margin-bottom: 1rem; }
    .tags-section .tag-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
    .tag-pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.6rem; background: #533483; border-radius: 12px; font-size: 0.8rem; }
    .tag-pill .remove-tag { cursor: pointer; opacity: 0.7; }
    .tag-pill .remove-tag:hover { opacity: 1; }
    .tag-input-row { display: flex; gap: 0.4rem; }
    .tag-input-row input { flex: 1; padding: 0.4rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; }
    .tag-input-row button { padding: 0.4rem 0.8rem; background: #533483; color: #fff; border: none; border-radius: 4px; cursor: pointer; }

    /* Close button */
    .detail-nav { position: absolute; top: 0.75rem; right: 1rem; display: flex; gap: 0.3rem; }
    .detail-nav button { padding: 0.3rem 0.8rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .detail-nav button:hover { background: #533483; }
    .detail-nav-bottom { display: flex; justify-content: center; gap: 0.4rem; margin: 1rem auto 0; }
    .detail-nav-bottom button { padding: 0.4rem 1.2rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
    .detail-nav-bottom button:hover { background: #533483; }

    /* Lightbox */
    #lightbox { display: none; position: fixed; inset: 0; background: #000; z-index: 200; user-select: none; }
    #lightbox.active { display: flex; align-items: center; justify-content: center; }
    #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 2.5rem; padding: 0.5rem 1rem; cursor: pointer; z-index: 201; }
    .lb-nav:hover { background: rgba(255,255,255,0.25); }
    .lb-prev { left: 1rem; }
    .lb-next { right: 1rem; }
    .lb-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; z-index: 201; }
    .lb-close:hover { color: #ccc; }

    /* Context menu */
    #ctx-menu { display: none; position: fixed; z-index: 300; background: #16213e; border: 1px solid #533483; border-radius: 6px; padding: 0.3rem 0; box-shadow: 0 4px 16px rgba(0,0,0,0.5); min-width: 150px; }
    #ctx-menu button { display: block; width: 100%; padding: 0.5rem 1rem; background: none; border: none; color: #eee; font-size: 0.85rem; text-align: left; cursor: pointer; }
    #ctx-menu button:hover { background: #533483; }
    .lb-counter { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); color: #aaa; font-size: 0.9rem; }
    .lb-filesize { position: absolute; bottom: 1rem; right: 1.5rem; color: #aaa; font-size: 0.85rem; }

    /* Multi-select checkbox */
    .photo-card .select-cb { position: absolute; top: 6px; left: 6px; width: 20px; height: 20px; accent-color: #533483; cursor: pointer; z-index: 10; }
    .photo-card.selected { outline: 3px solid #8e44ad; }

    /* Selection toolbar */
    #selection-toolbar { display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #16213e; border: 1px solid #533483; border-radius: 8px; padding: 0.6rem 1.2rem; z-index: 90; display: flex; align-items: center; gap: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    #selection-toolbar.active { display: flex; }
    #selection-toolbar .sel-count { font-size: 0.9rem; color: #aaa; }
    #selection-toolbar button { padding: 0.4rem 0.8rem; background: #533483; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    #selection-toolbar button:hover { background: #6c44a0; }
    #selection-toolbar button.danger { background: #c0392b; }
    #selection-toolbar button.danger:hover { background: #e74c3c; }

    /* Text entries section */
    .texts-section { margin-bottom: 1rem; }
    .texts-nav { display: flex; align-items: center; gap: 0.3rem; margin-bottom: 0.4rem; flex-wrap: wrap; }
    .texts-nav button { padding: 0.25rem 0.5rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; cursor: pointer; font-size: 0.8rem; min-width: 28px; }
    .texts-nav button:hover { background: #533483; }
    .texts-nav .texts-counter { font-size: 0.85rem; color: #aaa; margin: 0 0.3rem; }
    .texts-nav .texts-spacer { flex: 1; }
    .texts-section textarea { width: 100%; padding: 0.5rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; resize: vertical; min-height: 150px; font-family: inherit; }
    .texts-section .texts-actions { margin-top: 0.4rem; display: flex; gap: 0.4rem; }
    .texts-section .texts-actions button { padding: 0.4rem 1rem; background: #533483; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .texts-section .texts-actions button:hover { background: #6c44a0; }
    .texts-section .texts-actions button.danger { background: #c0392b; }
    .texts-section .texts-actions button.danger:hover { background: #e74c3c; }
    #txt-mic { font-size: 1.1rem; padding: 0.4rem 0.7rem; }
    #txt-mic.recording { background: #c0392b; animation: mic-pulse 1s ease-in-out infinite; }
    @keyframes mic-pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

    /* File-ops section in detail */
    .fileops-section { margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .fileops-section button { padding: 0.4rem 0.8rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .fileops-section button:hover { background: #533483; }
    .fileops-section .status-msg { font-size: 0.8rem; color: #27ae60; width: 100%; margin-top: 0.3rem; }

    /* Folder picker dialog */
    #folder-picker-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; }
    #folder-picker-overlay.active { display: flex; justify-content: center; align-items: center; }
    #folder-picker-dialog { background: #16213e; border-radius: 8px; padding: 1.5rem; min-width: 400px; }
    #folder-picker-dialog h3 { margin-bottom: 1rem; }
    #folder-picker-dialog input { width: 100%; padding: 0.5rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; margin-bottom: 0.5rem; }
    #folder-picker-dialog .folder-list { max-height: 200px; overflow-y: auto; margin-bottom: 1rem; }
    #folder-picker-dialog .folder-option { padding: 0.4rem 0.6rem; cursor: pointer; border-radius: 4px; font-size: 0.9rem; }
    #folder-picker-dialog .folder-option:hover { background: #533483; }
    #folder-picker-dialog .btn-row { display: flex; gap: 0.5rem; justify-content: flex-end; }
    #folder-picker-dialog .btn-row button { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
    #folder-picker-dialog .btn-move { background: #533483; color: #fff; }
    #folder-picker-dialog .btn-cancel { background: #333; color: #eee; }

    /* Group picker dialog */
    #group-picker-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; }
    #group-picker-overlay.active { display: flex; justify-content: center; align-items: center; }
    #group-picker-dialog { background: #16213e; border-radius: 8px; padding: 1.5rem; min-width: 400px; }
    #group-picker-dialog h3 { margin-bottom: 1rem; }
    #group-picker-dialog input { width: 100%; padding: 0.5rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; margin-bottom: 0.5rem; }
    #group-picker-dialog .group-list { max-height: 200px; overflow-y: auto; margin-bottom: 1rem; }
    #group-picker-dialog .group-option { padding: 0.4rem 0.6rem; cursor: pointer; border-radius: 4px; font-size: 0.9rem; }
    #group-picker-dialog .group-option:hover { background: #533483; }
    #group-picker-dialog .group-option.selected { background: #533483; }
    #group-picker-dialog .btn-row { display: flex; gap: 0.5rem; justify-content: flex-end; }
    #group-picker-dialog .btn-row button { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
    #group-picker-dialog .btn-add { background: #533483; color: #fff; }
    #group-picker-dialog .btn-cancel { background: #333; color: #eee; }
    .header-sep { color: #533483; font-size: 0.9rem; }

    /* Folder tree dropdown */
    #folder-list { display: none; position: absolute; top: 100%; left: 0; width: 400px; max-height: 60vh; background: #16213e; border: 1px solid #533483; border-radius: 4px; z-index: 50; margin-top: 2px; overflow: hidden; display: none; flex-direction: column; }
    #folder-list.open { display: flex; }
    #folder-list .fl-breadcrumb { display: flex; flex-wrap: wrap; gap: 0.2rem; padding: 0.4rem 0.6rem; align-items: center; font-size: 0.8rem; border-bottom: 1px solid #0f3460; }
    #folder-list .fl-crumb { color: #8e94f2; cursor: pointer; padding: 0.1rem 0.3rem; border-radius: 3px; }
    #folder-list .fl-crumb:hover { background: #533483; }
    #folder-list .fl-sep { color: #555; }
    #folder-list .fl-items { flex: 1; overflow-y: auto; min-height: 0; }
    #folder-list .fl-items::-webkit-scrollbar { width: 10px; }
    #folder-list .fl-items::-webkit-scrollbar-track { background: #0f3460; border-radius: 4px; }
    #folder-list .fl-items::-webkit-scrollbar-thumb { background: #533483; border-radius: 4px; }
    #folder-list .fl-items::-webkit-scrollbar-thumb:hover { background: #6c44a0; }
    #folder-list .fl-item { display: flex; align-items: center; border-bottom: 1px solid #0f3460; }
    #folder-list .fl-name { flex: 1; padding: 0.4rem 0.75rem; cursor: pointer; font-size: 0.85rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #folder-list .fl-name:hover { background: #533483; }
    #folder-list .fl-name.active { background: #533483; font-weight: 600; }
    #folder-list .fl-drill { padding: 0.4rem 0.6rem; cursor: pointer; color: #aaa; font-size: 0.75rem; }
    #folder-list .fl-drill:hover { background: #533483; color: #fff; }
  </style>
</head>
<body>
  <header>
    <h1>Photo Triage</h1>
    <div id="folder-dropdown">
      <button id="folder-btn">-- Folder --</button>
      <div id="folder-list">
        <div class="fl-breadcrumb" id="fl-breadcrumb"></div>
        <div class="fl-items" id="fl-items"></div>
      </div>
    </div>
    <span class="header-sep">|</span>
    <select id="group-select"><option value="">-- Select group --</option></select>
    <select id="filter-rating">
      <option value="">All ratings</option>
      <option value="keep">Keep</option>
      <option value="duplicate">Duplicate</option>
      <option value="skip">Skip</option>
      <option value="unrated">Unrated</option>
    </select>
    <select id="filter-tag"><option value="">All tags</option></select>
    <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;color:#aaa;cursor:pointer;">
      <input type="checkbox" id="select-all-cb"> Select all
    </label>
    <span class="photo-count" id="photo-count"></span>
  </header>

  <div id="photo-grid"></div>

  <div id="detail-overlay">
    <div id="detail-panel" style="position:relative;">
      <div class="detail-nav">
        <button id="detail-prev">&lt; Prev</button>
        <button id="close-detail">Close</button>
        <button id="detail-next">Next &gt;</button>
      </div>
      <img id="detail-img" src="" alt="">
      <h3 id="detail-filename"></h3>
      <div id="detail-filesize" style="font-size:0.85rem;color:#aaa;margin-bottom:1rem;"></div>

      <div class="caption-section">
        <textarea id="caption-input" placeholder="Add a caption..."></textarea>
        <button id="save-caption">Save Caption</button>
      </div>

      <div class="tags-section">
        <div class="tag-list" id="detail-tags"></div>
        <div class="tag-input-row">
          <input id="tag-input" list="tag-suggestions" placeholder="Add tag...">
          <datalist id="tag-suggestions"></datalist>
          <button id="add-tag-btn">Add</button>
        </div>
      </div>

      <div class="texts-section">
        <div class="texts-nav">
          <button id="txt-first" title="First">|&lt;</button>
          <button id="txt-back5" title="Back 5">&lt;&lt;</button>
          <button id="txt-prev" title="Previous">&lt;</button>
          <span class="texts-counter" id="txt-counter">0 / 0</span>
          <button id="txt-next" title="Next">&gt;</button>
          <button id="txt-fwd5" title="Forward 5">&gt;&gt;</button>
          <button id="txt-last" title="Last">&gt;|</button>
          <span class="texts-spacer"></span>
          <button id="txt-new">+ New</button>
          <button id="txt-delete" class="danger" style="background:#c0392b;border:none;color:#fff;">Delete</button>
        </div>
        <textarea id="txt-body" placeholder="Text entry..."></textarea>
        <div class="texts-actions">
          <button id="txt-save">Save</button>
          <button id="txt-mic" title="Voice transcription">&#x1F399;</button>
        </div>
      </div>

      <div class="rating-section">
        <span>Rating:</span>
        <button data-rating="keep">Keep</button>
        <button data-rating="duplicate">Duplicate</button>
        <button data-rating="skip">Skip</button>
        <button data-rating="">Clear</button>
      </div>

      <div class="fileops-section">
        <button id="btn-rename">Rename</button>
        <button id="btn-convert-png">Convert to PNG</button>
        <button id="btn-resize-print">Resize (Print)</button>
        <button id="btn-resize-screen">Resize (Screen)</button>
        <button id="btn-resize-both">Resize (Both)</button>
        <div class="status-msg" id="fileops-status"></div>
      </div>
      <div class="detail-nav-bottom">
        <button id="detail-prev-bottom">&lt; Prev</button>
        <button id="close-detail-bottom">Close</button>
        <button id="detail-next-bottom">Next &gt;</button>
      </div>
    </div>
    <div id="people-sidebar">
      <h4>People in Photo</h4>
      <div class="people-list" id="people-list"></div>
      <div class="sidebar-combo" id="people-combo">
        <input placeholder="Type name to add..." id="people-input">
        <div class="combo-matches" id="people-matches"></div>
      </div>

      <hr style="border-color:#533483;margin:1rem 0;">
      <h4>Places</h4>
      <div class="people-list" id="places-list"></div>
      <div class="sidebar-combo" id="places-combo">
        <input placeholder="Type place to add..." id="places-input">
        <div class="combo-matches" id="places-matches"></div>
      </div>

      <hr style="border-color:#533483;margin:1rem 0;">
      <h4>Things</h4>
      <div class="people-list" id="things-list"></div>
      <div class="sidebar-combo" id="things-combo">
        <input placeholder="Type thing to add..." id="things-input">
        <div class="combo-matches" id="things-matches"></div>
      </div>
    </div>
  </div>

  <!-- Selection toolbar -->
  <div id="selection-toolbar">
    <span class="sel-count" id="sel-count">0 selected</span>
    <button id="btn-move-selected">Move to folder</button>
    <button id="btn-add-to-group">Add to group</button>
    <button id="btn-deselect-all" class="danger">Deselect all</button>
  </div>

  <!-- Folder picker -->
  <div id="folder-picker-overlay">
    <div id="folder-picker-dialog">
      <h3>Move to folder</h3>
      <input id="folder-path-input" placeholder="Enter folder path (e.g. D:\Photos\Family)">
      <div class="folder-list" id="move-folder-list"></div>
      <div class="btn-row">
        <button class="btn-cancel" id="folder-picker-cancel">Cancel</button>
        <button class="btn-move" id="folder-picker-confirm">Move</button>
      </div>
    </div>
  </div>

  <!-- Group picker -->
  <div id="group-picker-overlay">
    <div id="group-picker-dialog">
      <h3>Add to group</h3>
      <input id="new-group-input" placeholder="Create new group...">
      <button id="btn-create-group-inline" style="margin-bottom:0.75rem;padding:0.35rem 0.8rem;background:#533483;color:#fff;border:none;border-radius:4px;cursor:pointer;">Create</button>
      <div class="group-list" id="group-list"></div>
      <div class="btn-row">
        <button class="btn-cancel" id="group-picker-cancel">Cancel</button>
        <button class="btn-add" id="group-picker-confirm">Add to group</button>
      </div>
    </div>
  </div>

  <div id="lightbox">
    <button class="lb-close" id="lb-close">&times;</button>
    <button class="lb-nav lb-prev" id="lb-prev">&#8249;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-nav lb-next" id="lb-next">&#8250;</button>
    <div class="lb-counter" id="lb-counter"></div>
    <div class="lb-filesize" id="lb-filesize"></div>
  </div>


  <div id="ctx-menu">
    <button id="ctx-rotate-right">Rotate right</button>
    <button id="ctx-rotate-left">Rotate left</button>
    <button id="ctx-hide">Hide (x_ prefix)</button>
  </div>

  <script>
    const grid = document.getElementById('photo-grid');
    const folderBtn = document.getElementById('folder-btn');
    const folderList = document.getElementById('folder-list');
    const flBreadcrumb = document.getElementById('fl-breadcrumb');
    const flItems = document.getElementById('fl-items');
    let selectedFolder = ''; // disk path of chosen folder
    let flBrowsePath = 'D:/'; // current browsing path in tree dropdown
    const groupSelect = document.getElementById('group-select');
    const filterRating = document.getElementById('filter-rating');
    const filterTag = document.getElementById('filter-tag');
    const photoCount = document.getElementById('photo-count');
    const overlay = document.getElementById('detail-overlay');
    const detailImg = document.getElementById('detail-img');
    const detailFilename = document.getElementById('detail-filename');
    const captionInput = document.getElementById('caption-input');
    const detailTags = document.getElementById('detail-tags');
    const tagInput = document.getElementById('tag-input');
    const tagSuggestions = document.getElementById('tag-suggestions');

    let photos = [];
    let allTags = [];
    let currentPhoto = null;
    let activeSource = null; // 'folder', 'group', or 'disk'

    // --- Folder tree dropdown ---
    folderBtn.addEventListener('click', () => {
      if (folderList.classList.contains('open')) {
        folderList.classList.remove('open');
      } else {
        folderList.classList.add('open');
        renderFolderTree();
      }
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('#folder-dropdown')) folderList.classList.remove('open');
    });

    function renderFlBreadcrumb() {
      flBreadcrumb.innerHTML = '';
      const parts = flBrowsePath.split('/');
      parts.forEach((part, i) => {
        if (i > 0) {
          const sep = document.createElement('span');
          sep.className = 'fl-sep';
          sep.textContent = '/';
          flBreadcrumb.appendChild(sep);
        }
        const crumb = document.createElement('span');
        crumb.className = 'fl-crumb';
        crumb.textContent = part || '/';
        const ancestorPath = parts.slice(0, i + 1).join('/');
        crumb.addEventListener('click', (e) => {
          e.stopPropagation();
          flBrowsePath = ancestorPath;
          renderFolderTree();
        });
        flBreadcrumb.appendChild(crumb);
      });
    }

    async function renderFolderTree() {
      renderFlBreadcrumb();
      flItems.innerHTML = '<div style="padding:0.5rem 0.75rem;color:#aaa;font-size:0.85rem;">Loading...</div>';
      try {
        const res = await fetch(`/api/disk-folders?path=${encodeURIComponent(flBrowsePath)}`);
        const dirs = await res.json();
        flItems.innerHTML = '';
        if (dirs.length === 0) {
          flItems.innerHTML = '<div style="padding:0.5rem 0.75rem;color:#aaa;font-size:0.85rem;">(no subdirectories)</div>';
          return;
        }
        dirs.forEach(d => {
          const row = document.createElement('div');
          row.className = 'fl-item';
          const name = document.createElement('span');
          name.className = 'fl-name' + (d.path === selectedFolder ? ' active' : '');
          name.textContent = d.name;
          name.addEventListener('click', (e) => {
            e.stopPropagation();
            selectFolder(d.path, d.name);
          });
          row.appendChild(name);
          if (d.hasSubdirs) {
            const drill = document.createElement('span');
            drill.className = 'fl-drill';
            drill.innerHTML = '&#9654;';
            drill.title = 'Browse subfolders';
            drill.addEventListener('click', (e) => {
              e.stopPropagation();
              flBrowsePath = d.path;
              renderFolderTree();
            });
            row.appendChild(drill);
          }
          flItems.appendChild(row);
        });
      } catch (err) {
        flItems.innerHTML = `<div style="padding:0.5rem 0.75rem;color:#c0392b;font-size:0.85rem;">Error: ${err.message}</div>`;
      }
    }

    function selectFolder(diskPath, label) {
      selectedFolder = diskPath;
      folderBtn.textContent = label;
      folderList.classList.remove('open');
      activeSource = 'disk';
      groupSelect.value = '';
      loadPhotos();
    }

    // Load groups
    async function loadGroups() {
      const res = await fetch('/api/groups');
      const groups = await res.json();
      while (groupSelect.options.length > 1) groupSelect.remove(1);
      groups.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = `${g.name} (${g.member_count})`;
        groupSelect.appendChild(opt);
      });
    }

    // Load all tags
    async function loadAllTags() {
      const res = await fetch('/api/tags');
      allTags = await res.json();
      tagSuggestions.innerHTML = '';
      filterTag.innerHTML = '<option value="">All tags</option>';
      allTags.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.name;
        tagSuggestions.appendChild(opt);
        const fopt = document.createElement('option');
        fopt.value = t.id;
        fopt.textContent = t.name;
        filterTag.appendChild(fopt);
      });
    }

    // Load photos — disk mode uses /api/disk-photos, group mode uses /api/photos
    async function loadPhotos() {
      const group = groupSelect.value;

      if (activeSource === 'group' && group) {
        const res = await fetch(`/api/photos?group=${encodeURIComponent(group)}`);
        photos = await res.json();
        // DB photos: mark source
        photos.forEach(p => { p._src = 'db'; });
        renderGrid();
        return;
      }

      if (activeSource === 'disk' && selectedFolder) {
        const res = await fetch(`/api/disk-photos?path=${encodeURIComponent(selectedFolder)}`);
        const diskFiles = await res.json();
        // Map to photo objects with _src='disk'
        photos = diskFiles.map(f => ({
          filename: f.filename,
          disk_path: f.disk_path,
          _src: 'disk',
          id: null, rating: null, caption: null
        }));
        renderGrid();
        // Async: hash-match to get DB metadata
        matchDiskPhotos(selectedFolder);
        return;
      }

      grid.innerHTML = '';
      photoCount.textContent = '';
    }

    async function matchDiskPhotos(folderPath) {
      try {
        const res = await fetch(`/api/disk-photos/match?path=${encodeURIComponent(folderPath)}`);
        const matches = await res.json();
        if (selectedFolder !== folderPath) return; // navigated away
        const matchMap = new Map(matches.map(m => [m.filename, m]));
        let changed = false;
        photos.forEach(p => {
          const m = matchMap.get(p.filename);
          if (m) {
            p.id = m.db_id;
            p.rating = m.rating;
            p.caption = m.caption;
            changed = true;
          }
        });
        if (changed) renderGrid();
      } catch (_) {}
    }

    function renderGrid() {
      const ratingFilter = filterRating.value;
      const tagFilter = filterTag.value;

      let filtered = photos;
      if (ratingFilter === 'unrated') {
        filtered = filtered.filter(p => !p.rating);
      } else if (ratingFilter) {
        filtered = filtered.filter(p => p.rating === ratingFilter);
      }

      if (tagFilter && activeSource !== 'disk') {
        loadTaggedFiles(tagFilter).then(taggedIds => {
          const set = new Set(taggedIds);
          const tagFiltered = filtered.filter(p => set.has(p.id));
          renderCards(tagFiltered);
        });
        return;
      }

      renderCards(filtered);
    }

    async function loadTaggedFiles(tagId) {
      const group = groupSelect.value;
      const url = activeSource === 'group' && group
        ? `/api/photos?group=${encodeURIComponent(group)}`
        : `/api/photos?folder=${encodeURIComponent(selectedFolder)}`;
      const res = await fetch(url);
      const all = await res.json();
      const ids = [];
      for (const p of all) {
        const tr = await fetch(`/api/photo/${p.id}/tags`);
        const tags = await tr.json();
        if (tags.some(t => t.id == tagId)) ids.push(p.id);
      }
      return ids;
    }

    function photoImgSrc(p) {
      if (p._src === 'disk') return `/api/disk-photo?path=${encodeURIComponent(p.disk_path)}`;
      return `/api/photo/${p.id}`;
    }

    function renderCards(list) {
      photoCount.textContent = `${list.length} photos`;
      grid.innerHTML = '';
      list.forEach((p, idx) => {
        const card = document.createElement('div');
        const cardKey = p.id || p.disk_path;
        card.className = 'photo-card' + (p.id && selectedIds.has(p.id) ? ' selected' : '');
        card.dataset.photoId = p.id || '';
        card.dataset.idx = idx;
        card.innerHTML = `
          <input type="checkbox" class="select-cb" ${p.id && selectedIds.has(p.id) ? 'checked' : ''}>
          <img src="${photoImgSrc(p)}" loading="lazy" alt="${p.filename}">
          ${p.rating ? `<span class="rating-badge rating-${p.rating}">${p.rating}</span>` : ''}
        `;
        const cb = card.querySelector('.select-cb');
        cb.addEventListener('click', (e) => {
          e.stopPropagation();
          if (p.id) toggleSelect(p.id, card, cb);
        });
        card.querySelector('img').addEventListener('contextmenu', (e) => showCtxMenu(e, p));
        card.addEventListener('click', (e) => {
          if (e.target === cb) return;
          openDetail(p);
        });
        grid.appendChild(card);
      });
      updateSelectionUI();
    }

    // Detail view
    async function openDetail(photo) {
      currentPhoto = photo;
      detailImg.src = photoImgSrc(photo);
      detailFilename.textContent = photo.filename;
      const detailFilesize = document.getElementById('detail-filesize');
      detailFilesize.textContent = '';
      const fsq = photo.id ? `id=${photo.id}` : `path=${encodeURIComponent(photo.disk_path)}`;
      fetch(`/api/file-size?${fsq}`).then(r => r.json()).then(d => {
        if (currentPhoto === photo && d.size) detailFilesize.textContent = formatFileSize(d.size);
      }).catch(() => {});
      overlay.classList.add('active');

      if (photo.id) {
        // Load caption
        const capRes = await fetch(`/api/photo/${photo.id}/caption`);
        const capData = await capRes.json();
        captionInput.value = capData.caption || '';
        // Load tags
        await loadPhotoTags();
        // Load text entries
        await loadPhotoTexts();
        // Load sidebar
        await loadAllSidebar();
        loadPhotoPeople(); loadPhotoPlaces(); loadPhotoThings();
      } else {
        captionInput.value = photo.caption || '';
        detailTags.innerHTML = '<span style="color:#aaa;font-size:0.8rem;">Not in database (no hash match yet)</span>';
        photoTexts = []; txtIndex = 0; showCurrentText();
        peopleList.innerHTML = ''; placesList.innerHTML = ''; thingsList.innerHTML = '';
      }

      // Set active rating button
      document.querySelectorAll('.rating-section button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.rating === (photo.rating || ''));
      });
    }

    async function loadPhotoTags() {
      if (!currentPhoto || !currentPhoto.id) { detailTags.innerHTML = ''; return; }
      const res = await fetch(`/api/photo/${currentPhoto.id}/tags`);
      const tags = await res.json();
      detailTags.innerHTML = '';
      tags.forEach(t => {
        const pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.innerHTML = `${t.name} <span class="remove-tag" data-tag-id="${t.id}">&times;</span>`;
        pill.querySelector('.remove-tag').addEventListener('click', async () => {
          await fetch(`/api/photo/${currentPhoto.id}/tags/${t.id}`, { method: 'DELETE' });
          loadPhotoTags();
        });
        detailTags.appendChild(pill);
      });
    }

    // Close detail
    async function closeDetail() {
      await saveCurrentText();
      overlay.classList.remove('active');
      // Don't reload disk photos on close (avoid re-hashing), just re-render
      renderGrid();
    }
    document.getElementById('close-detail').addEventListener('click', closeDetail);
    document.getElementById('close-detail-bottom').addEventListener('click', closeDetail);

    // Prev/next in detail view
    async function detailNav(dir) {
      await saveCurrentText();
      const list = getCurrentFilteredList();
      const idx = list.findIndex(p => p === currentPhoto || (p.id && p.id === currentPhoto.id));
      if (idx < 0) return;
      const next = idx + dir;
      if (next < 0 || next >= list.length) return;
      openDetail(list[next]);
    }
    document.getElementById('detail-prev').addEventListener('click', () => detailNav(-1));
    document.getElementById('detail-next').addEventListener('click', () => detailNav(1));
    document.getElementById('detail-prev-bottom').addEventListener('click', () => detailNav(-1));
    document.getElementById('detail-next-bottom').addEventListener('click', () => detailNav(1));
    overlay.addEventListener('click', async (e) => {
      if (e.target === overlay) {
        await saveCurrentText();
        overlay.classList.remove('active');
        renderGrid();
      }
    });

    // --- Sidebar combo helper ---
    // Reusable: builds a type-ahead combo for people/places/things
    function setupSidebarCombo({ inputId, matchesId, listId, allItemsFn, loadPhotoItemsFn,
                                  fetchAllUrl, createUrl, photoLinkUrl, idKey }) {
      const input = document.getElementById(inputId);
      const matchesEl = document.getElementById(matchesId);
      const listEl = document.getElementById(listId);

      function renderMatches() {
        const q = input.value.trim().toLowerCase();
        matchesEl.innerHTML = '';
        if (!q) { matchesEl.classList.remove('open'); return; }
        const hits = allItemsFn().filter(item => item.name.toLowerCase().includes(q));
        hits.forEach(item => {
          const div = document.createElement('div');
          div.className = 'combo-match';
          div.textContent = item.name;
          div.addEventListener('mousedown', async (e) => {
            e.preventDefault();
            if (!currentPhoto || !currentPhoto.id) return;
            await fetch(photoLinkUrl(currentPhoto.id), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ [idKey]: item.id })
            });
            input.value = '';
            matchesEl.classList.remove('open');
            loadPhotoItemsFn();
          });
          matchesEl.appendChild(div);
        });
        // "Create" option if no exact match
        const exact = hits.some(item => item.name.toLowerCase() === q);
        if (!exact) {
          const div = document.createElement('div');
          div.className = 'combo-create';
          div.textContent = `+ Create "${input.value.trim()}"`;
          div.addEventListener('mousedown', async (e) => {
            e.preventDefault();
            if (!currentPhoto || !currentPhoto.id) return;
            const res = await fetch(createUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: input.value.trim() })
            });
            const created = await res.json();
            await fetch(photoLinkUrl(currentPhoto.id), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ [idKey]: created.id })
            });
            input.value = '';
            matchesEl.classList.remove('open');
            await loadAllSidebar();
            loadPhotoItemsFn();
          });
          matchesEl.appendChild(div);
        }
        matchesEl.classList.add('open');
      }

      input.addEventListener('input', renderMatches);
      input.addEventListener('focus', renderMatches);
      input.addEventListener('blur', () => { matchesEl.classList.remove('open'); });

      return { listEl };
    }

    // --- People ---
    const peopleList = document.getElementById('people-list');
    let allPeople = [];
    async function loadAllPeople() { allPeople = await (await fetch('/api/people')).json(); }
    async function loadPhotoPeople() {
      peopleList.innerHTML = '';
      if (!currentPhoto || !currentPhoto.id) return;
      const people = await (await fetch(`/api/photo/${currentPhoto.id}/people`)).json();
      people.forEach(pp => {
        const row = document.createElement('div');
        row.className = 'person-row';
        row.innerHTML = `<span>${pp.name}</span><button title="Remove">&times;</button>`;
        row.querySelector('button').addEventListener('click', async () => {
          await fetch(`/api/photo-people/${pp.id}`, { method: 'DELETE' });
          loadPhotoPeople();
        });
        peopleList.appendChild(row);
      });
    }
    setupSidebarCombo({
      inputId: 'people-input', matchesId: 'people-matches', listId: 'people-list',
      allItemsFn: () => allPeople, loadPhotoItemsFn: loadPhotoPeople,
      fetchAllUrl: '/api/people', createUrl: '/api/people',
      photoLinkUrl: id => `/api/photo/${id}/people`, idKey: 'person_id'
    });

    // --- Places ---
    const placesList = document.getElementById('places-list');
    let allPlaces = [];
    async function loadAllPlaces() { allPlaces = await (await fetch('/api/places')).json(); }
    async function loadPhotoPlaces() {
      placesList.innerHTML = '';
      if (!currentPhoto || !currentPhoto.id) return;
      const places = await (await fetch(`/api/photo/${currentPhoto.id}/places`)).json();
      places.forEach(pp => {
        const row = document.createElement('div');
        row.className = 'person-row';
        row.innerHTML = `<span>${pp.name}</span><button title="Remove">&times;</button>`;
        row.querySelector('button').addEventListener('click', async () => {
          await fetch(`/api/photo-places/${pp.id}`, { method: 'DELETE' });
          loadPhotoPlaces();
        });
        placesList.appendChild(row);
      });
    }
    setupSidebarCombo({
      inputId: 'places-input', matchesId: 'places-matches', listId: 'places-list',
      allItemsFn: () => allPlaces, loadPhotoItemsFn: loadPhotoPlaces,
      fetchAllUrl: '/api/places', createUrl: '/api/places',
      photoLinkUrl: id => `/api/photo/${id}/places`, idKey: 'place_id'
    });

    // --- Things ---
    const thingsList = document.getElementById('things-list');
    let allThings = [];
    async function loadAllThings() { allThings = await (await fetch('/api/things')).json(); }
    async function loadPhotoThings() {
      thingsList.innerHTML = '';
      if (!currentPhoto || !currentPhoto.id) return;
      const things = await (await fetch(`/api/photo/${currentPhoto.id}/things`)).json();
      things.forEach(pt => {
        const row = document.createElement('div');
        row.className = 'person-row';
        row.innerHTML = `<span>${pt.name}</span><button title="Remove">&times;</button>`;
        row.querySelector('button').addEventListener('click', async () => {
          await fetch(`/api/photo-things/${pt.id}`, { method: 'DELETE' });
          loadPhotoThings();
        });
        thingsList.appendChild(row);
      });
    }
    setupSidebarCombo({
      inputId: 'things-input', matchesId: 'things-matches', listId: 'things-list',
      allItemsFn: () => allThings, loadPhotoItemsFn: loadPhotoThings,
      fetchAllUrl: '/api/things', createUrl: '/api/things',
      photoLinkUrl: id => `/api/photo/${id}/things`, idKey: 'thing_id'
    });

    async function loadAllSidebar() {
      await Promise.all([loadAllPeople(), loadAllPlaces(), loadAllThings()]);
    }

    // Save caption
    document.getElementById('save-caption').addEventListener('click', async () => {
      if (!currentPhoto || !currentPhoto.id) return;
      await fetch(`/api/photo/${currentPhoto.id}/caption`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ caption: captionInput.value })
      });
    });

    // Rating buttons
    document.querySelectorAll('.rating-section button').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!currentPhoto || !currentPhoto.id) return;
        const rating = btn.dataset.rating || null;
        await fetch(`/api/photo/${currentPhoto.id}/rating`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rating })
        });
        currentPhoto.rating = rating;
        document.querySelectorAll('.rating-section button').forEach(b => {
          b.classList.toggle('active', b.dataset.rating === (rating || ''));
        });
      });
    });

    // Add tag
    document.getElementById('add-tag-btn').addEventListener('click', async () => {
      const name = tagInput.value.trim();
      if (!name || !currentPhoto || !currentPhoto.id) return;
      // Create or find tag
      const res = await fetch('/api/tags', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const tag = await res.json();
      // Assign to photo
      await fetch(`/api/photo/${currentPhoto.id}/tags`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tag_id: tag.id })
      });
      tagInput.value = '';
      loadPhotoTags();
      loadAllTags();
    });

    // --- Text entries ---
    const txtBody = document.getElementById('txt-body');
    const txtCounter = document.getElementById('txt-counter');
    let photoTexts = [];
    let txtIndex = 0;

    async function loadPhotoTexts() {
      if (!currentPhoto) { photoTexts = []; txtIndex = 0; showCurrentText(); return; }
      const res = await fetch(`/api/photo/${currentPhoto.id}/texts`);
      photoTexts = await res.json();
      txtIndex = photoTexts.length > 0 ? 0 : 0;
      showCurrentText();
    }

    function showCurrentText() {
      if (photoTexts.length === 0) {
        txtCounter.textContent = '0 / 0';
        txtBody.value = '';
        return;
      }
      if (txtIndex < 0) txtIndex = 0;
      if (txtIndex >= photoTexts.length) txtIndex = photoTexts.length - 1;
      txtCounter.textContent = `${txtIndex + 1} / ${photoTexts.length}`;
      txtBody.value = photoTexts[txtIndex].body || '';
    }

    async function saveCurrentText() {
      if (!currentPhoto) return;
      const text = txtBody.value;
      // Auto-create entry if user typed something but no entry exists yet
      if (photoTexts.length === 0) {
        if (!text) return; // nothing to save
        const res = await fetch(`/api/photo/${currentPhoto.id}/texts`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ body: text })
        });
        const entry = await res.json();
        photoTexts.push(entry);
        txtIndex = 0;
        showCurrentText();
        return;
      }
      const entry = photoTexts[txtIndex];
      if (text === (entry.body || '')) return; // no change
      await fetch(`/api/text/${entry.id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ body: text })
      });
      entry.body = text;
    }

    document.getElementById('txt-first').addEventListener('click', async () => { await saveCurrentText(); txtIndex = 0; showCurrentText(); });
    document.getElementById('txt-back5').addEventListener('click', async () => { await saveCurrentText(); txtIndex = Math.max(0, txtIndex - 5); showCurrentText(); });
    document.getElementById('txt-prev').addEventListener('click', async () => { await saveCurrentText(); txtIndex = Math.max(0, txtIndex - 1); showCurrentText(); });
    document.getElementById('txt-next').addEventListener('click', async () => { await saveCurrentText(); txtIndex = Math.min(photoTexts.length - 1, txtIndex + 1); showCurrentText(); });
    document.getElementById('txt-fwd5').addEventListener('click', async () => { await saveCurrentText(); txtIndex = Math.min(photoTexts.length - 1, txtIndex + 5); showCurrentText(); });
    document.getElementById('txt-last').addEventListener('click', async () => { await saveCurrentText(); txtIndex = photoTexts.length - 1; showCurrentText(); });

    document.getElementById('txt-new').addEventListener('click', async () => {
      if (!currentPhoto) return;
      await saveCurrentText();
      const res = await fetch(`/api/photo/${currentPhoto.id}/texts`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ body: '' })
      });
      const entry = await res.json();
      photoTexts.push(entry);
      txtIndex = photoTexts.length - 1;
      showCurrentText();
      txtBody.focus();
    });

    document.getElementById('txt-save').addEventListener('click', saveCurrentText);

    document.getElementById('txt-delete').addEventListener('click', async () => {
      if (photoTexts.length === 0 || !currentPhoto) return;
      const entry = photoTexts[txtIndex];
      await fetch(`/api/text/${entry.id}`, { method: 'DELETE' });
      photoTexts.splice(txtIndex, 1);
      if (txtIndex > 0 && txtIndex >= photoTexts.length) txtIndex = photoTexts.length - 1;
      showCurrentText();
    });

    // --- Voice transcription (Web Speech API) ---
    const micBtn = document.getElementById('txt-mic');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.continuous = true;
      recognition.interimResults = false;
      recognition.lang = 'en-US';
      let insertPos = 0;

      micBtn.addEventListener('click', () => {
        if (micBtn.classList.contains('recording')) {
          recognition.stop();
          return;
        }
        insertPos = txtBody.selectionStart ?? txtBody.value.length;
        micBtn.classList.add('recording');
        micBtn.title = 'Recording... click to stop';
        recognition.start();
      });

      recognition.onresult = (e) => {
        for (let i = e.resultIndex; i < e.results.length; i++) {
          if (e.results[i].isFinal) {
            const chunk = e.results[i][0].transcript;
            const val = txtBody.value;
            txtBody.value = val.slice(0, insertPos) + chunk + val.slice(insertPos);
            insertPos += chunk.length;
          }
        }
      };

      recognition.onend = () => {
        micBtn.classList.remove('recording');
        micBtn.title = 'Voice transcription';
      };

      recognition.onerror = (e) => {
        console.warn('Speech recognition error:', e.error);
        micBtn.classList.remove('recording');
        micBtn.title = 'Voice transcription';
      };
    } else {
      micBtn.style.display = 'none';
    }

    // Filters -- folder and group are mutually exclusive
    groupSelect.addEventListener('change', () => {
      if (groupSelect.value) {
        activeSource = 'group';
        selectedFolder = '';
        folderBtn.textContent = '-- Folder --';
      } else {
        activeSource = null;
      }
      loadPhotos();
    });
    filterRating.addEventListener('change', renderGrid);
    filterTag.addEventListener('change', renderGrid);

    // --- Lightbox ---
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    const lbFilesize = document.getElementById('lb-filesize');
    let lbIndex = 0;
    let lbList = []; // filtered photo list at time of open

    function openLightbox(index) {
      // Use the currently rendered filtered list
      lbList = getCurrentFilteredList();
      lbIndex = index;
      showLbPhoto();
      lightbox.classList.add('active');
      overlay.classList.remove('active'); // close detail modal
    }

    function getCurrentFilteredList() {
      // Re-derive from current photos + filters (sync path only)
      const ratingFilter = filterRating.value;
      let filtered = photos;
      if (ratingFilter === 'unrated') filtered = filtered.filter(p => !p.rating);
      else if (ratingFilter) filtered = filtered.filter(p => p.rating === ratingFilter);
      return filtered;
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function showLbPhoto() {
      if (lbList.length === 0) return;
      const p = lbList[lbIndex];
      lbImg.src = photoImgSrc(p);
      lbCounter.textContent = `${lbIndex + 1} / ${lbList.length}`;
      lbFilesize.textContent = '';
      const q = p.id ? `id=${p.id}` : `path=${encodeURIComponent(p.disk_path)}`;
      fetch(`/api/file-size?${q}`).then(r => r.json()).then(d => {
        if (lbList[lbIndex] === p && d.size) lbFilesize.textContent = formatFileSize(d.size);
      }).catch(() => {});
    }

    function lbNav(dir) {
      if (lbList.length === 0) return;
      lbIndex = (lbIndex + dir + lbList.length) % lbList.length;
      showLbPhoto();
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      if (currentPhoto) overlay.classList.add('active');
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => lbNav(-1));
    document.getElementById('lb-next').addEventListener('click', () => lbNav(1));

    // Click detail image to open lightbox
    detailImg.style.cursor = 'pointer';
    detailImg.addEventListener('click', () => {
      if (!currentPhoto) return;
      const list = getCurrentFilteredList();
      const idx = list.findIndex(p => p.id === currentPhoto.id);
      openLightbox(idx >= 0 ? idx : 0);
    });

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') lbNav(-1);
      else if (e.key === 'ArrowRight') lbNav(1);
    });

    // Click lightbox image or background to close back to detail
    lbImg.style.cursor = 'pointer';
    lbImg.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // --- Multi-select ---
    const selectedIds = new Set();
    const selectionToolbar = document.getElementById('selection-toolbar');
    const selCount = document.getElementById('sel-count');
    const selectAllCb = document.getElementById('select-all-cb');

    function updateSelectionUI() {
      const n = selectedIds.size;
      selCount.textContent = `${n} selected`;
      selectionToolbar.classList.toggle('active', n > 0);
      if (n === 0) selectionToolbar.style.display = 'none';
      else selectionToolbar.style.display = 'flex';
      // sync select-all checkbox
      const cards = grid.querySelectorAll('.photo-card');
      selectAllCb.checked = cards.length > 0 && selectedIds.size === cards.length;
    }

    function toggleSelect(id, card, cb) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
        card.classList.remove('selected');
        cb.checked = false;
      } else {
        selectedIds.add(id);
        card.classList.add('selected');
        cb.checked = true;
      }
      updateSelectionUI();
    }

    selectAllCb.addEventListener('change', () => {
      const cards = grid.querySelectorAll('.photo-card');
      cards.forEach(card => {
        const id = Number(card.dataset.photoId);
        const cb = card.querySelector('.select-cb');
        if (selectAllCb.checked) {
          selectedIds.add(id);
          card.classList.add('selected');
          if (cb) cb.checked = true;
        } else {
          selectedIds.delete(id);
          card.classList.remove('selected');
          if (cb) cb.checked = false;
        }
      });
      updateSelectionUI();
    });

    document.getElementById('btn-deselect-all').addEventListener('click', () => {
      selectedIds.clear();
      grid.querySelectorAll('.photo-card').forEach(c => {
        c.classList.remove('selected');
        const cb = c.querySelector('.select-cb');
        if (cb) cb.checked = false;
      });
      selectAllCb.checked = false;
      updateSelectionUI();
    });

    // --- File ops (detail modal) ---
    const fileopStatus = document.getElementById('fileops-status');

    document.getElementById('btn-rename').addEventListener('click', async () => {
      if (!currentPhoto || !currentPhoto.id) return;
      const stem = currentPhoto.filename.replace(/\.[^.]+$/, '');
      const newName = prompt('New filename (without extension):', stem);
      if (!newName || newName === stem) return;
      fileopStatus.textContent = 'Renaming...';
      const res = await fetch(`/api/photo/${currentPhoto.id}/rename`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ newName })
      });
      const data = await res.json();
      if (data.ok) {
        currentPhoto.filename = data.filename;
        currentPhoto.original_path = data.original_path;
        detailFilename.textContent = data.filename;
        fileopStatus.textContent = 'Renamed successfully';
      } else {
        fileopStatus.textContent = 'Error: ' + (data.error || 'rename failed');
        fileopStatus.style.color = '#c0392b';
      }
      setTimeout(() => { fileopStatus.textContent = ''; fileopStatus.style.color = '#27ae60'; }, 3000);
    });

    document.getElementById('btn-convert-png').addEventListener('click', async () => {
      if (!currentPhoto || !currentPhoto.id) return;
      fileopStatus.textContent = 'Converting to PNG...';
      const res = await fetch(`/api/photo/${currentPhoto.id}/convert-png`, { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        fileopStatus.textContent = `PNG created (${data.width}x${data.height})`;
      } else {
        fileopStatus.textContent = 'Error: ' + (data.error || 'convert failed');
        fileopStatus.style.color = '#c0392b';
      }
      setTimeout(() => { fileopStatus.textContent = ''; fileopStatus.style.color = '#27ae60'; }, 3000);
    });

    async function doResize(mode) {
      if (!currentPhoto || !currentPhoto.id) return;
      fileopStatus.textContent = `Resizing (${mode})...`;
      const res = await fetch(`/api/photo/${currentPhoto.id}/resize`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode })
      });
      const data = await res.json();
      if (data.ok) {
        const parts = [];
        data.results.forEach(r => parts.push(`${r.mode}: ${r.width}x${r.height}`));
        data.skipped.forEach(s => parts.push(`${s.mode}: skipped (${s.reason})`));
        fileopStatus.textContent = parts.join(' | ');
      } else {
        fileopStatus.textContent = 'Error: ' + (data.error || 'resize failed');
        fileopStatus.style.color = '#c0392b';
      }
      setTimeout(() => { fileopStatus.textContent = ''; fileopStatus.style.color = '#27ae60'; }, 5000);
    }

    document.getElementById('btn-resize-print').addEventListener('click', () => doResize('print'));
    document.getElementById('btn-resize-screen').addEventListener('click', () => doResize('screen'));
    document.getElementById('btn-resize-both').addEventListener('click', () => doResize('both'));

    // --- Move to folder ---
    const folderPickerOverlay = document.getElementById('folder-picker-overlay');
    const folderPathInput = document.getElementById('folder-path-input');
    const moveFolderListEl = document.getElementById('move-folder-list');

    document.getElementById('btn-move-selected').addEventListener('click', async () => {
      if (selectedIds.size === 0) return;
      // Populate folder list from disk
      moveFolderListEl.innerHTML = '';
      if (selectedFolder) {
        try {
          const parentPath = selectedFolder.replace(/\/[^/]+$/, '') || selectedFolder;
          const res = await fetch(`/api/disk-folders?path=${encodeURIComponent(parentPath)}`);
          const dirs = await res.json();
          dirs.forEach(d => {
            const div = document.createElement('div');
            div.className = 'folder-option';
            div.textContent = d.name;
            div.addEventListener('click', () => { folderPathInput.value = d.path; });
            moveFolderListEl.appendChild(div);
          });
        } catch (_) {}
      }
      folderPathInput.value = '';
      folderPickerOverlay.classList.add('active');
    });

    document.getElementById('folder-picker-cancel').addEventListener('click', () => {
      folderPickerOverlay.classList.remove('active');
    });

    document.getElementById('folder-picker-confirm').addEventListener('click', async () => {
      const target = folderPathInput.value.trim();
      if (!target) return;
      const ids = Array.from(selectedIds);
      const res = await fetch('/api/photos/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileIds: ids, targetFolder: target })
      });
      const data = await res.json();
      folderPickerOverlay.classList.remove('active');
      selectedIds.clear();
      updateSelectionUI();
      selectAllCb.checked = false;
      loadPhotos();
      // Folder tree will refresh on next open
    });

    // --- Add to group ---
    const groupPickerOverlay = document.getElementById('group-picker-overlay');
    const groupListEl = document.getElementById('group-list');
    const newGroupInput = document.getElementById('new-group-input');
    let selectedGroupId = null;

    document.getElementById('btn-add-to-group').addEventListener('click', async () => {
      if (selectedIds.size === 0) return;
      selectedGroupId = null;
      newGroupInput.value = '';
      // Populate group list
      groupListEl.innerHTML = '';
      const res = await fetch('/api/groups');
      const groups = await res.json();
      groups.forEach(g => {
        const div = document.createElement('div');
        div.className = 'group-option';
        div.textContent = `${g.name} (${g.member_count})`;
        div.addEventListener('click', () => {
          groupListEl.querySelectorAll('.group-option').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          selectedGroupId = g.id;
        });
        groupListEl.appendChild(div);
      });
      groupPickerOverlay.classList.add('active');
    });

    document.getElementById('btn-create-group-inline').addEventListener('click', async () => {
      const name = newGroupInput.value.trim();
      if (!name) return;
      const res = await fetch('/api/groups', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const created = await res.json();
      if (created.id) {
        selectedGroupId = created.id;
        // Add to list and select it
        const div = document.createElement('div');
        div.className = 'group-option selected';
        div.textContent = `${created.name} (0)`;
        groupListEl.querySelectorAll('.group-option').forEach(el => el.classList.remove('selected'));
        groupListEl.prepend(div);
        div.addEventListener('click', () => {
          groupListEl.querySelectorAll('.group-option').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          selectedGroupId = created.id;
        });
        newGroupInput.value = '';
        loadGroups(); // refresh header dropdown
      }
    });

    document.getElementById('group-picker-cancel').addEventListener('click', () => {
      groupPickerOverlay.classList.remove('active');
    });

    document.getElementById('group-picker-confirm').addEventListener('click', async () => {
      if (!selectedGroupId) return;
      const ids = Array.from(selectedIds);
      await fetch(`/api/groups/${selectedGroupId}/photos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file_ids: ids })
      });
      groupPickerOverlay.classList.remove('active');
      selectedIds.clear();
      updateSelectionUI();
      selectAllCb.checked = false;
      loadGroups(); // refresh counts
    });

    // --- Context menu (rotate) ---
    const ctxMenu = document.getElementById('ctx-menu');
    let ctxPhoto = null;

    function showCtxMenu(e, photo) {
      e.preventDefault();
      ctxPhoto = photo;
      ctxMenu.style.left = e.clientX + 'px';
      ctxMenu.style.top = e.clientY + 'px';
      ctxMenu.style.display = 'block';
    }

    function hideCtxMenu() { ctxMenu.style.display = 'none'; ctxPhoto = null; }

    document.addEventListener('click', hideCtxMenu);
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideCtxMenu(); });

    function isSamePhoto(a, b) {
      if (a.id && b.id) return a.id === b.id;
      return a.disk_path && b.disk_path && a.disk_path === b.disk_path;
    }

    function cacheBustPhoto(photo) {
      const t = '_t=' + Date.now();
      const expected = photoImgSrc(photo);
      const expectedBase = expected.split('?')[0];
      document.querySelectorAll('.photo-card img, #detail-img, #lb-img').forEach(img => {
        const curBase = img.getAttribute('src').replace(/[?&]_t=\d+/, '').split('?')[0];
        if (curBase === expectedBase) {
          img.src = expected + (expected.includes('?') ? '&' : '?') + t;
        }
      });
    }

    async function rotatePhoto(photo, angle) {
      const body = photo.id ? { id: photo.id, angle } : { path: photo.disk_path, angle };
      try {
        const res = await fetch('/api/rotate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) { console.error('Rotate failed:', data.error); return; }
        cacheBustPhoto(photo);
      } catch (err) {
        console.error('Rotate failed:', err);
      }
    }

    document.getElementById('ctx-rotate-right').addEventListener('click', () => {
      if (ctxPhoto) rotatePhoto(ctxPhoto, 90);
    });
    document.getElementById('ctx-rotate-left').addEventListener('click', () => {
      if (ctxPhoto) rotatePhoto(ctxPhoto, 270);
    });

    document.getElementById('ctx-hide').addEventListener('click', async () => {
      if (!ctxPhoto) return;
      const body = ctxPhoto.id ? { id: ctxPhoto.id } : { path: ctxPhoto.disk_path };
      try {
        const res = await fetch('/api/hide', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        const data = await res.json();
        if (!res.ok) { console.error('Hide failed:', data.error); return; }
        // Remove from photos array and re-render
        const hiddenPhoto = ctxPhoto;
        photos = photos.filter(p => !isSamePhoto(p, hiddenPhoto));
        // If in lightbox, navigate to next or close
        if (lightbox.classList.contains('active')) {
          lbList = lbList.filter(p => !isSamePhoto(p, hiddenPhoto));
          if (lbList.length === 0) { closeLightbox(); }
          else { lbIndex = Math.min(lbIndex, lbList.length - 1); showLbPhoto(); }
        }
        // Close detail if showing this photo
        if (currentPhoto && isSamePhoto(currentPhoto, hiddenPhoto)) {
          overlay.classList.remove('active');
        }
        renderGrid();
      } catch (err) {
        console.error('Hide failed:', err);
      }
    });

    // Wire context menu on detail and lightbox images
    detailImg.addEventListener('contextmenu', (e) => { if (currentPhoto) showCtxMenu(e, currentPhoto); });
    lbImg.addEventListener('contextmenu', (e) => { if (lbList[lbIndex]) showCtxMenu(e, lbList[lbIndex]); });

    // Init
    loadGroups();
    loadAllTags();
  </script>
</body>
</html>
