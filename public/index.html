<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Triage</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header>
    <h1>Photo Triage</h1>
    <div id="folder-dropdown">
      <button id="folder-btn">-- Folder --</button>
      <div id="folder-list">
        <div class="fl-breadcrumb" id="fl-breadcrumb"></div>
        <div class="fl-items" id="fl-items"></div>
      </div>
    </div>
    <span class="header-sep">|</span>
    <select id="group-select"><option value="">-- Select group --</option></select>
    <select id="filter-rating">
      <option value="">All ratings</option>
      <option value="keep">Keep</option>
      <option value="duplicate">Duplicate</option>
      <option value="skip">Skip</option>
      <option value="unrated">Unrated</option>
    </select>
    <select id="filter-tag"><option value="">All tags</option></select>
    <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;color:var(--text-muted);cursor:pointer;">
      <input type="checkbox" id="select-all-cb"> Select all
    </label>
    <select id="account-filter" style="padding:0.4rem 0.8rem;background:var(--bg-input);color:var(--text-primary);border:1px solid var(--border-accent);border-radius:4px;font-size:0.9rem;">
      <option value="all">All accounts</option>
      <option value="master">Master only</option>
    </select>
    <button id="header-history-btn">History</button>
    <button id="header-docs-btn">Documents</button>
    <button id="header-settings-btn" title="Settings">&#9881;</button>
    <span class="photo-count" id="photo-count"></span>
  </header>

  <div id="photo-grid"></div>

  <div id="detail-overlay">
    <div id="detail-panel" style="position:relative;">
      <div class="detail-nav">
        <button id="detail-prev">&lt; Prev</button>
        <button id="close-detail">Close</button>
        <button id="detail-next">Next &gt;</button>
      </div>
      <div class="zoom-controls">
        <button id="zoom-out" title="Zoom out">-</button>
        <span class="zoom-level" id="zoom-level">Fit</span>
        <button id="zoom-in" title="Zoom in">+</button>
        <button id="zoom-reset" title="Reset zoom">Fit</button>
      </div>
      <div class="detail-img-viewport" id="detail-img-viewport">
        <div class="detail-img-wrap" id="detail-img-wrap">
          <img id="detail-img" src="" alt="">
          <canvas id="face-canvas" width="0" height="0"></canvas>
          <div id="face-picker">
            <button id="fp-identify-btn">Identify</button>
            <div id="fp-identify-results">
              <div id="fp-id-matches"></div>
              <span id="fp-back-link">Back to search</span>
            </div>
            <input id="face-picker-input" placeholder="Type name...">
            <div class="fp-matches" id="fp-matches"></div>
          </div>
        </div>
      </div>
      <h3 id="detail-filename" style="display:inline;"></h3><button id="btn-bookmark-photo" title="Bookmark this photo">Bookmark</button>
      <div id="detail-filesize" style="font-size:0.85rem;color:var(--text-muted);margin-bottom:1rem;"></div>

      <div class="caption-section">
        <textarea id="caption-input" placeholder="Add a caption..."></textarea>
        <button id="save-caption">Save Caption</button>
      </div>

      <div class="tags-section">
        <div class="tag-list" id="detail-tags"></div>
        <div class="tag-input-row">
          <input id="tag-input" list="tag-suggestions" placeholder="Add tag...">
          <datalist id="tag-suggestions"></datalist>
          <button id="add-tag-btn">Add</button>
        </div>
      </div>

      <div class="texts-section">
        <div class="texts-nav">
          <button id="txt-first" title="First">|&lt;</button>
          <button id="txt-back5" title="Back 5">&lt;&lt;</button>
          <button id="txt-prev" title="Previous">&lt;</button>
          <span class="texts-counter" id="txt-counter">0 / 0</span>
          <button id="txt-next" title="Next">&gt;</button>
          <button id="txt-fwd5" title="Forward 5">&gt;&gt;</button>
          <button id="txt-last" title="Last">&gt;|</button>
          <span class="texts-spacer"></span>
          <button id="txt-new">+ New</button>
          <button id="txt-delete" class="danger" style="background:var(--danger);border:none;color:#fff;">Delete</button>
        </div>
        <textarea id="txt-body" placeholder="Text entry..."></textarea>
        <div class="texts-actions">
          <button id="txt-save">Save</button>
          <button id="txt-mic" title="Voice transcription">&#x1F399;</button>
        </div>
      </div>

      <div class="rating-section">
        <span>Rating:</span>
        <button data-rating="keep">Keep</button>
        <button data-rating="duplicate">Duplicate</button>
        <button data-rating="skip">Skip</button>
        <button data-rating="">Clear</button>
      </div>

      <div class="detail-nav-bottom">
        <button id="detail-prev-bottom">&lt; Prev</button>
        <button id="close-detail-bottom">Close</button>
        <button id="detail-next-bottom">Next &gt;</button>
      </div>
    </div>
    <div id="people-sidebar">
      <h4 style="display:flex;align-items:center;justify-content:space-between;">People in Photo <button id="tag-face-btn" title="Toggle face tagging mode">Faces</button></h4>

      <div class="people-list" id="people-list"></div>
      <div class="sidebar-combo" id="people-combo">
        <input placeholder="Type name to add..." id="people-input">
        <div class="combo-matches" id="people-matches"></div>
      </div>

      <hr style="border-color:var(--border-accent);margin:1rem 0;">
      <h4>Places</h4>
      <div class="people-list" id="places-list"></div>
      <div class="sidebar-combo" id="places-combo">
        <input placeholder="Type place to add..." id="places-input">
        <div class="combo-matches" id="places-matches"></div>
      </div>

      <hr style="border-color:var(--border-accent);margin:1rem 0;">
      <h4>Things</h4>
      <div class="people-list" id="things-list"></div>
      <div class="sidebar-combo" id="things-combo">
        <input placeholder="Type thing to add..." id="things-input">
        <div class="combo-matches" id="things-matches"></div>
      </div>

      <hr style="border-color:var(--border-accent);margin:1rem 0;">
      <h4>Documents</h4>
      <div class="people-list" id="photo-docs-list"></div>
      <div class="sidebar-combo" id="docs-combo">
        <input placeholder="Type document to add..." id="docs-input">
        <div class="combo-matches" id="docs-matches"></div>
      </div>
    </div>
  </div>

  <!-- Selection toolbar -->
  <div id="selection-toolbar">
    <span class="sel-count" id="sel-count">0 selected</span>
    <button id="btn-add-to-group">Add to group</button>
    <button id="btn-deselect-all" class="danger">Deselect all</button>
  </div>


  <!-- Group picker -->
  <div id="group-picker-overlay">
    <div id="group-picker-dialog">
      <h3>Add to group</h3>
      <input id="new-group-input" placeholder="Create new group...">
      <button id="btn-create-group-inline" style="margin-bottom:0.75rem;padding:0.35rem 0.8rem;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;">Create</button>
      <div class="group-list" id="group-list"></div>
      <div class="btn-row">
        <button class="btn-cancel" id="group-picker-cancel">Cancel</button>
        <button class="btn-add" id="group-picker-confirm">Add to group</button>
      </div>
    </div>
  </div>

  <!-- Documents overlay -->
  <div id="docs-overlay">
    <button id="docs-close">&times;</button>
    <div id="docs-panel">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">
        <h4 style="margin:0;font-size:0.95rem;color:var(--text-muted);"><a href="#" id="docs-home" style="color:var(--link-color);text-decoration:none;margin-right:0.75rem;">&larr; Home</a> Documents</h4>
        <button id="docs-new-btn" style="padding:0.25rem 0.6rem;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:0.8rem;">+ New</button>
      </div>
      <input class="doc-search" id="doc-search" placeholder="Search documents...">
      <div id="doc-list"></div>
    </div>
    <div id="doc-detail">
      <div id="doc-detail-empty" style="color:var(--text-dimmer);font-size:0.9rem;margin-top:2rem;">Select or create a document.</div>
      <div id="doc-detail-content" style="display:none;">
        <input class="doc-title-input" id="doc-title-input" placeholder="Title">
        <textarea class="doc-body-input" id="doc-body-input" placeholder="Write your story or notes here..."></textarea>
        <div class="doc-actions">
          <button class="doc-save" id="doc-save-btn">Save</button>
          <button class="doc-delete" id="doc-delete-btn">Delete</button>
        </div>
        <div class="doc-section-title">Files</div>
        <div id="doc-files-list"></div>
        <div class="doc-upload-row">
          <input type="file" id="doc-file-input">
          <button id="doc-upload-btn">Upload</button>
        </div>
        <div class="doc-section-title">People</div>
        <div id="doc-people-list"></div>
        <div class="sidebar-combo"><input placeholder="Add person..." id="doc-people-input"><div class="combo-matches" id="doc-people-matches"></div></div>
        <div class="doc-section-title">Places</div>
        <div id="doc-places-list"></div>
        <div class="sidebar-combo"><input placeholder="Add place..." id="doc-places-input"><div class="combo-matches" id="doc-places-matches"></div></div>
        <div class="doc-section-title">Things</div>
        <div id="doc-things-list"></div>
        <div class="sidebar-combo"><input placeholder="Add thing..." id="doc-things-input"><div class="combo-matches" id="doc-things-matches"></div></div>
        <div class="doc-section-title">Photos</div>
        <div id="doc-photos-list"></div>
      </div>
    </div>
  </div>

  <!-- History/Bookmarks overlay -->
  <div id="hb-overlay">
    <div id="hb-dialog">
      <div class="hb-header">
        <a href="#" id="hb-home" style="color:var(--link-color);text-decoration:none;font-size:0.9rem;">&larr; Home</a>
        <h3>History & Bookmarks</h3>
        <button id="hb-close">&times;</button>
      </div>
      <div class="hb-tabs">
        <button class="hb-tab active" data-tab="bookmarks">Bookmarks</button>
        <button class="hb-tab" data-tab="history">History</button>
      </div>
      <div class="hb-content" id="hb-content"></div>
    </div>
  </div>

  <!-- Settings modal -->
  <div id="settings-overlay">
    <div id="settings-dialog">
      <h3>Settings</h3>
      <label for="settings-theme">Theme</label>
      <select id="settings-theme">
        <option value="dark">Dark</option>
        <option value="light">Light</option>
      </select>
      <label>Photo roots</label>
      <div id="settings-roots-list" style="margin-bottom:0.5rem;max-height:150px;overflow-y:auto;"></div>
      <div style="display:flex;gap:0.4rem;margin-bottom:1rem;">
        <input type="text" id="settings-root-label" placeholder="Label" style="flex:1;">
        <input type="text" id="settings-root-path" placeholder="Path e.g. D:/" style="flex:2;">
        <button id="settings-root-add" style="padding:0.4rem 0.7rem;background:var(--accent);color:#fff;border:none;border-radius:4px;cursor:pointer;white-space:nowrap;">+ Add</button>
      </div>
      <hr style="border-color:var(--border-accent);margin:0.5rem 0 1rem;">
      <label for="settings-local-account">Local account name</label>
      <input type="text" id="settings-local-account" placeholder="e.g. Bridget">
      <label for="settings-local-photos-dir">Local photos directory</label>
      <input type="text" id="settings-local-photos-dir" placeholder="e.g. C:/Users/Bridget/Photos">
      <div class="btn-row">
        <button class="btn-cancel" id="settings-cancel">Cancel</button>
        <button class="btn-save" id="settings-save">Save</button>
      </div>
    </div>
  </div>

  <div id="lightbox">
    <button class="lb-close" id="lb-close">&times;</button>
    <button class="lb-nav lb-prev" id="lb-prev">&#8249;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-nav lb-next" id="lb-next">&#8250;</button>
    <div class="lb-counter" id="lb-counter"></div>
    <div class="lb-filesize" id="lb-filesize"></div>
  </div>


  <div id="person-remove-popup">
    <div class="prp-name" id="prp-name"></div>
    <button class="prp-unlink" id="prp-unlink">Remove from this photo</button>
    <button class="prp-delete" id="prp-delete">Delete person entirely</button>
    <button class="prp-cancel" id="prp-cancel">Cancel</button>
  </div>

  <!-- Person form overlay -->
  <div id="pf-overlay">
    <div id="pf-dialog">
      <div class="pf-header">
        <h3 id="pf-title">Edit Person</h3>
        <button id="pf-close">&times;</button>
      </div>
      <div class="pf-body">
        <div class="pf-section">Name</div>
        <input class="pf-input" id="pf-name" placeholder="Primary name">

        <div class="pf-section">Aliases</div>
        <div id="pf-aliases"></div>
        <div class="pf-add-row">
          <input id="pf-alias-input" placeholder="Add alias...">
          <button id="pf-alias-add">+ Add</button>
        </div>

        <div class="pf-section">Details</div>
        <div class="pf-row">
          <input class="pf-input pf-input-half" id="pf-birth" type="date" title="Birth date">
          <input class="pf-input pf-input-half" id="pf-death" type="date" title="Death date">
        </div>
        <div class="pf-row">
          <select class="pf-input" id="pf-gender" style="flex:1;">
            <option value="">Gender...</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <textarea class="pf-input" id="pf-notes" placeholder="Notes..."></textarea>

        <div class="pf-section">Relationships</div>
        <div id="pf-rels"></div>
        <div class="pf-add-rel-row">
          <select id="pf-rel-type">
            <option value="parent">parent</option>
            <option value="child">child</option>
            <option value="father">father</option>
            <option value="mother">mother</option>
            <option value="grandparent">grandparent</option>
            <option value="grandchild">grandchild</option>
            <option value="grandfather">grandfather</option>
            <option value="grandmother">grandmother</option>
            <option value="godparent">godparent</option>
            <option value="godfather">godfather</option>
            <option value="godmother">godmother</option>
            <option value="godchild">godchild</option>
            <option value="spouse">spouse</option>
            <option value="sibling">sibling</option>
            <option value="cousin">cousin</option>
            <option value="aunt">aunt</option>
            <option value="uncle">uncle</option>
            <option value="niece">niece</option>
            <option value="nephew">nephew</option>
            <option value="friend">friend</option>
            <option value="employer">employer</option>
            <option value="employee">employee</option>
            <option value="teacher">teacher</option>
            <option value="student">student</option>
            <option value="classmate">classmate</option>
          </select>
          <select id="pf-rel-basis">
            <option value="">(none)</option>
            <option value="biological">biological</option>
            <option value="adoptive">adoptive</option>
            <option value="step">step</option>
            <option value="foster">foster</option>
            <option value="de facto">de facto</option>
          </select>
          <div class="pf-rel-wrap">
            <input id="pf-rel-input" placeholder="Type name...">
            <div class="pf-rel-matches" id="pf-rel-matches"></div>
          </div>
          <button id="pf-rel-add" class="pf-add-btn">+ Add</button>
        </div>
      </div>
      <div class="pf-footer">
        <button id="pf-cancel">Cancel</button>
        <button id="pf-save">Save</button>
      </div>
    </div>
  </div>

  <div id="ctx-menu">
    <button id="ctx-rotate-right">Rotate right</button>
    <button id="ctx-rotate-left">Rotate left</button>
    <button id="ctx-hide">Hide (x_ prefix)</button>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/folders.js"></script>
  <script src="/js/photos.js"></script>
  <script src="/js/detail.js"></script>
  <script src="/js/sidebar.js"></script>
  <script src="/js/lightbox.js"></script>
  <script src="/js/faces.js"></script>
  <script src="/js/documents.js"></script>
  <script src="/js/history.js"></script>
  <script src="/js/settings.js"></script>
</body>
</html>
