<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photo Triage</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; }

    /* Header */
    header { display: flex; align-items: center; gap: 1rem; padding: 0.75rem 1.5rem; background: #16213e; border-bottom: 1px solid #0f3460; }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    #folder-select, #group-select { padding: 0.4rem 0.8rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; font-size: 0.9rem; }
    #filter-rating { padding: 0.4rem 0.8rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; font-size: 0.9rem; }
    #filter-tag { padding: 0.4rem 0.8rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; font-size: 0.9rem; }
    .photo-count { font-size: 0.85rem; color: #aaa; margin-left: auto; }

    /* Grid */
    #photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(256px, 1fr)); gap: 0.5rem; padding: 1rem; }
    .photo-card { position: relative; cursor: pointer; border-radius: 4px; overflow: hidden; background: #0f3460; }
    .photo-card img { width: 100%; height: 256px; object-fit: cover; display: block; }
    .photo-card .rating-badge { position: absolute; top: 6px; right: 6px; padding: 2px 8px; border-radius: 3px; font-size: 0.7rem; font-weight: 600; text-transform: uppercase; }
    .rating-keep { background: #27ae60; }
    .rating-duplicate { background: #e67e22; }
    .rating-skip { background: #c0392b; }
    .photo-card .folder-badge { position: absolute; bottom: 6px; left: 6px; padding: 2px 6px; background: rgba(0,0,0,0.7); border-radius: 3px; font-size: 0.65rem; color: #ccc; max-width: 90%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .photo-card:hover { outline: 2px solid #533483; }

    /* Detail modal */
    #detail-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; overflow-y: auto; }
    #detail-overlay.active { display: flex; justify-content: center; align-items: flex-start; padding: 2rem; }
    #detail-panel { background: #16213e; border-radius: 8px; max-width: 900px; width: 100%; padding: 1.5rem; }
    #detail-panel img { max-width: 100%; max-height: 512px; object-fit: contain; display: block; margin: 0 auto 1rem; border-radius: 4px; }
    #detail-panel h3 { margin-bottom: 1rem; font-size: 1rem; color: #aaa; }

    /* Caption */
    .caption-section { margin-bottom: 1rem; }
    .caption-section textarea { width: 100%; padding: 0.5rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; resize: vertical; min-height: 60px; font-family: inherit; }
    .caption-section button { margin-top: 0.4rem; padding: 0.4rem 1rem; background: #533483; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    .caption-section button:hover { background: #6c44a0; }

    /* Rating */
    .rating-section { margin-bottom: 1rem; display: flex; gap: 0.5rem; align-items: center; }
    .rating-section button { padding: 0.4rem 1rem; border: 1px solid #533483; background: transparent; color: #eee; border-radius: 4px; cursor: pointer; }
    .rating-section button.active { background: #533483; font-weight: 600; }
    .rating-section button:hover { background: #533483; }

    /* Tags */
    .tags-section { margin-bottom: 1rem; }
    .tags-section .tag-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem; }
    .tag-pill { display: inline-flex; align-items: center; gap: 0.3rem; padding: 0.25rem 0.6rem; background: #533483; border-radius: 12px; font-size: 0.8rem; }
    .tag-pill .remove-tag { cursor: pointer; opacity: 0.7; }
    .tag-pill .remove-tag:hover { opacity: 1; }
    .tag-input-row { display: flex; gap: 0.4rem; }
    .tag-input-row input { flex: 1; padding: 0.4rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; }
    .tag-input-row button { padding: 0.4rem 0.8rem; background: #533483; color: #fff; border: none; border-radius: 4px; cursor: pointer; }

    /* Close button */
    .close-btn { position: absolute; top: 1rem; right: 1.5rem; font-size: 1.5rem; cursor: pointer; color: #aaa; background: none; border: none; }
    .close-btn:hover { color: #fff; }

    /* Lightbox */
    #lightbox { display: none; position: fixed; inset: 0; background: #000; z-index: 200; user-select: none; }
    #lightbox.active { display: flex; align-items: center; justify-content: center; }
    #lightbox img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .lb-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: none; color: #fff; font-size: 2.5rem; padding: 0.5rem 1rem; cursor: pointer; z-index: 201; }
    .lb-nav:hover { background: rgba(255,255,255,0.25); }
    .lb-prev { left: 1rem; }
    .lb-next { right: 1rem; }
    .lb-close { position: absolute; top: 1rem; right: 1.5rem; background: none; border: none; color: #fff; font-size: 2rem; cursor: pointer; z-index: 201; }
    .lb-close:hover { color: #ccc; }
    .lb-counter { position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%); color: #aaa; font-size: 0.9rem; }

    /* Multi-select checkbox */
    .photo-card .select-cb { position: absolute; top: 6px; left: 6px; width: 20px; height: 20px; accent-color: #533483; cursor: pointer; z-index: 10; }
    .photo-card.selected { outline: 3px solid #8e44ad; }

    /* Selection toolbar */
    #selection-toolbar { display: none; position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #16213e; border: 1px solid #533483; border-radius: 8px; padding: 0.6rem 1.2rem; z-index: 90; display: flex; align-items: center; gap: 1rem; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
    #selection-toolbar.active { display: flex; }
    #selection-toolbar .sel-count { font-size: 0.9rem; color: #aaa; }
    #selection-toolbar button { padding: 0.4rem 0.8rem; background: #533483; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    #selection-toolbar button:hover { background: #6c44a0; }
    #selection-toolbar button.danger { background: #c0392b; }
    #selection-toolbar button.danger:hover { background: #e74c3c; }

    /* File-ops section in detail */
    .fileops-section { margin-bottom: 1rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .fileops-section button { padding: 0.4rem 0.8rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
    .fileops-section button:hover { background: #533483; }
    .fileops-section .status-msg { font-size: 0.8rem; color: #27ae60; width: 100%; margin-top: 0.3rem; }

    /* Folder picker dialog */
    #folder-picker-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; }
    #folder-picker-overlay.active { display: flex; justify-content: center; align-items: center; }
    #folder-picker-dialog { background: #16213e; border-radius: 8px; padding: 1.5rem; min-width: 400px; }
    #folder-picker-dialog h3 { margin-bottom: 1rem; }
    #folder-picker-dialog input { width: 100%; padding: 0.5rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; margin-bottom: 0.5rem; }
    #folder-picker-dialog .folder-list { max-height: 200px; overflow-y: auto; margin-bottom: 1rem; }
    #folder-picker-dialog .folder-option { padding: 0.4rem 0.6rem; cursor: pointer; border-radius: 4px; font-size: 0.9rem; }
    #folder-picker-dialog .folder-option:hover { background: #533483; }
    #folder-picker-dialog .btn-row { display: flex; gap: 0.5rem; justify-content: flex-end; }
    #folder-picker-dialog .btn-row button { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
    #folder-picker-dialog .btn-move { background: #533483; color: #fff; }
    #folder-picker-dialog .btn-cancel { background: #333; color: #eee; }

    /* Group picker dialog */
    #group-picker-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; }
    #group-picker-overlay.active { display: flex; justify-content: center; align-items: center; }
    #group-picker-dialog { background: #16213e; border-radius: 8px; padding: 1.5rem; min-width: 400px; }
    #group-picker-dialog h3 { margin-bottom: 1rem; }
    #group-picker-dialog input { width: 100%; padding: 0.5rem; background: #0f3460; color: #eee; border: 1px solid #533483; border-radius: 4px; margin-bottom: 0.5rem; }
    #group-picker-dialog .group-list { max-height: 200px; overflow-y: auto; margin-bottom: 1rem; }
    #group-picker-dialog .group-option { padding: 0.4rem 0.6rem; cursor: pointer; border-radius: 4px; font-size: 0.9rem; }
    #group-picker-dialog .group-option:hover { background: #533483; }
    #group-picker-dialog .group-option.selected { background: #533483; }
    #group-picker-dialog .btn-row { display: flex; gap: 0.5rem; justify-content: flex-end; }
    #group-picker-dialog .btn-row button { padding: 0.4rem 1rem; border: none; border-radius: 4px; cursor: pointer; }
    #group-picker-dialog .btn-add { background: #533483; color: #fff; }
    #group-picker-dialog .btn-cancel { background: #333; color: #eee; }
    .header-sep { color: #533483; font-size: 0.9rem; }
  </style>
</head>
<body>
  <header>
    <h1>Photo Triage</h1>
    <select id="folder-select"><option value="">-- Select folder --</option><option value="__all__">All folders</option></select>
    <span class="header-sep">|</span>
    <select id="group-select"><option value="">-- Select group --</option></select>
    <select id="filter-rating">
      <option value="">All ratings</option>
      <option value="keep">Keep</option>
      <option value="duplicate">Duplicate</option>
      <option value="skip">Skip</option>
      <option value="unrated">Unrated</option>
    </select>
    <select id="filter-tag"><option value="">All tags</option></select>
    <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.85rem;color:#aaa;cursor:pointer;">
      <input type="checkbox" id="select-all-cb"> Select all
    </label>
    <span class="photo-count" id="photo-count"></span>
  </header>

  <div id="photo-grid"></div>

  <div id="detail-overlay">
    <div id="detail-panel" style="position:relative;">
      <button class="close-btn" id="close-detail">&times;</button>
      <img id="detail-img" src="" alt="">
      <h3 id="detail-filename"></h3>

      <div class="rating-section">
        <span>Rating:</span>
        <button data-rating="keep">Keep</button>
        <button data-rating="duplicate">Duplicate</button>
        <button data-rating="skip">Skip</button>
        <button data-rating="">Clear</button>
      </div>

      <div class="caption-section">
        <textarea id="caption-input" placeholder="Add a caption..."></textarea>
        <button id="save-caption">Save Caption</button>
      </div>

      <div class="tags-section">
        <div class="tag-list" id="detail-tags"></div>
        <div class="tag-input-row">
          <input id="tag-input" list="tag-suggestions" placeholder="Add tag...">
          <datalist id="tag-suggestions"></datalist>
          <button id="add-tag-btn">Add</button>
        </div>
      </div>

      <div class="fileops-section">
        <button id="btn-rename">Rename</button>
        <button id="btn-convert-png">Convert to PNG</button>
        <button id="btn-resize-print">Resize (Print)</button>
        <button id="btn-resize-screen">Resize (Screen)</button>
        <button id="btn-resize-both">Resize (Both)</button>
        <div class="status-msg" id="fileops-status"></div>
      </div>
    </div>
  </div>

  <!-- Selection toolbar -->
  <div id="selection-toolbar">
    <span class="sel-count" id="sel-count">0 selected</span>
    <button id="btn-move-selected">Move to folder</button>
    <button id="btn-add-to-group">Add to group</button>
    <button id="btn-deselect-all" class="danger">Deselect all</button>
  </div>

  <!-- Folder picker -->
  <div id="folder-picker-overlay">
    <div id="folder-picker-dialog">
      <h3>Move to folder</h3>
      <input id="folder-path-input" placeholder="Enter folder path (e.g. D:\Photos\Family)">
      <div class="folder-list" id="folder-list"></div>
      <div class="btn-row">
        <button class="btn-cancel" id="folder-picker-cancel">Cancel</button>
        <button class="btn-move" id="folder-picker-confirm">Move</button>
      </div>
    </div>
  </div>

  <!-- Group picker -->
  <div id="group-picker-overlay">
    <div id="group-picker-dialog">
      <h3>Add to group</h3>
      <input id="new-group-input" placeholder="Create new group...">
      <button id="btn-create-group-inline" style="margin-bottom:0.75rem;padding:0.35rem 0.8rem;background:#533483;color:#fff;border:none;border-radius:4px;cursor:pointer;">Create</button>
      <div class="group-list" id="group-list"></div>
      <div class="btn-row">
        <button class="btn-cancel" id="group-picker-cancel">Cancel</button>
        <button class="btn-add" id="group-picker-confirm">Add to group</button>
      </div>
    </div>
  </div>

  <div id="lightbox">
    <button class="lb-close" id="lb-close">&times;</button>
    <button class="lb-nav lb-prev" id="lb-prev">&#8249;</button>
    <img id="lb-img" src="" alt="">
    <button class="lb-nav lb-next" id="lb-next">&#8250;</button>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <script>
    const grid = document.getElementById('photo-grid');
    const folderSelect = document.getElementById('folder-select');
    const groupSelect = document.getElementById('group-select');
    const filterRating = document.getElementById('filter-rating');
    const filterTag = document.getElementById('filter-tag');
    const photoCount = document.getElementById('photo-count');
    const overlay = document.getElementById('detail-overlay');
    const detailImg = document.getElementById('detail-img');
    const detailFilename = document.getElementById('detail-filename');
    const captionInput = document.getElementById('caption-input');
    const detailTags = document.getElementById('detail-tags');
    const tagInput = document.getElementById('tag-input');
    const tagSuggestions = document.getElementById('tag-suggestions');

    let photos = [];
    let allTags = [];
    let currentPhoto = null;
    let activeSource = null; // 'folder' or 'group'

    // Load folders
    async function loadFolders() {
      const res = await fetch('/api/folders');
      const folders = await res.json();
      // Clear existing folder options beyond the first two
      while (folderSelect.options.length > 2) folderSelect.remove(2);
      folders.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.source_folder;
        opt.textContent = `${f.source_folder} (${f.count})`;
        folderSelect.appendChild(opt);
      });
    }

    // Load groups
    async function loadGroups() {
      const res = await fetch('/api/groups');
      const groups = await res.json();
      while (groupSelect.options.length > 1) groupSelect.remove(1);
      groups.forEach(g => {
        const opt = document.createElement('option');
        opt.value = g.id;
        opt.textContent = `${g.name} (${g.member_count})`;
        groupSelect.appendChild(opt);
      });
    }

    // Load all tags
    async function loadAllTags() {
      const res = await fetch('/api/tags');
      allTags = await res.json();
      tagSuggestions.innerHTML = '';
      filterTag.innerHTML = '<option value="">All tags</option>';
      allTags.forEach(t => {
        const opt = document.createElement('option');
        opt.value = t.name;
        tagSuggestions.appendChild(opt);
        const fopt = document.createElement('option');
        fopt.value = t.id;
        fopt.textContent = t.name;
        filterTag.appendChild(fopt);
      });
    }

    // Load photos
    async function loadPhotos() {
      const folder = folderSelect.value;
      const group = groupSelect.value;

      if (activeSource === 'group' && group) {
        const res = await fetch(`/api/photos?group=${encodeURIComponent(group)}`);
        photos = await res.json();
        renderGrid();
        return;
      }

      if (!folder) { grid.innerHTML = ''; photoCount.textContent = ''; return; }
      const res = await fetch(`/api/photos?folder=${encodeURIComponent(folder)}`);
      photos = await res.json();
      renderGrid();
    }

    function renderGrid() {
      const ratingFilter = filterRating.value;
      const tagFilter = filterTag.value;

      let filtered = photos;
      if (ratingFilter === 'unrated') {
        filtered = filtered.filter(p => !p.rating);
      } else if (ratingFilter) {
        filtered = filtered.filter(p => p.rating === ratingFilter);
      }

      // Tag filter is async but we do a simple client filter based on cached tag data
      // For now, tag filtering requires server-side (we'll load tagged file ids)
      if (tagFilter) {
        // We'll do tag filtering via a class on cards after loading
        loadTaggedFiles(tagFilter).then(taggedIds => {
          const set = new Set(taggedIds);
          const tagFiltered = filtered.filter(p => set.has(p.id));
          renderCards(tagFiltered);
        });
        return;
      }

      renderCards(filtered);
    }

    async function loadTaggedFiles(tagId) {
      const folder = folderSelect.value;
      const res = await fetch(`/api/photos?folder=${encodeURIComponent(folder)}`);
      const all = await res.json();
      // Check each photo's tags (expensive but fine for 200 files)
      const ids = [];
      for (const p of all) {
        const tr = await fetch(`/api/photo/${p.id}/tags`);
        const tags = await tr.json();
        if (tags.some(t => t.id == tagId)) ids.push(p.id);
      }
      return ids;
    }

    function renderCards(list) {
      const showFolder = folderSelect.value === '__all__' || activeSource === 'group';
      photoCount.textContent = `${list.length} photos`;
      grid.innerHTML = '';
      list.forEach(p => {
        const card = document.createElement('div');
        card.className = 'photo-card' + (selectedIds.has(p.id) ? ' selected' : '');
        card.dataset.photoId = p.id;
        const folderName = p.source_folder ? p.source_folder.split(/[\\/]/).pop() : '';
        card.innerHTML = `
          <input type="checkbox" class="select-cb" ${selectedIds.has(p.id) ? 'checked' : ''}>
          <img src="/api/photo/${p.id}" loading="lazy" alt="${p.filename}">
          ${p.rating ? `<span class="rating-badge rating-${p.rating}">${p.rating}</span>` : ''}
          ${showFolder && folderName ? `<span class="folder-badge" title="${p.source_folder}">${folderName}</span>` : ''}
        `;
        const cb = card.querySelector('.select-cb');
        cb.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleSelect(p.id, card, cb);
        });
        card.addEventListener('click', (e) => {
          if (e.target === cb) return;
          openDetail(p);
        });
        grid.appendChild(card);
      });
      updateSelectionUI();
    }

    // Detail view
    async function openDetail(photo) {
      currentPhoto = photo;
      detailImg.src = `/api/photo/${photo.id}`;
      detailFilename.textContent = photo.filename;
      overlay.classList.add('active');

      // Load caption
      const capRes = await fetch(`/api/photo/${photo.id}/caption`);
      const capData = await capRes.json();
      captionInput.value = capData.caption || '';

      // Load tags
      await loadPhotoTags();

      // Set active rating button
      document.querySelectorAll('.rating-section button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.rating === (photo.rating || ''));
      });
    }

    async function loadPhotoTags() {
      const res = await fetch(`/api/photo/${currentPhoto.id}/tags`);
      const tags = await res.json();
      detailTags.innerHTML = '';
      tags.forEach(t => {
        const pill = document.createElement('span');
        pill.className = 'tag-pill';
        pill.innerHTML = `${t.name} <span class="remove-tag" data-tag-id="${t.id}">&times;</span>`;
        pill.querySelector('.remove-tag').addEventListener('click', async () => {
          await fetch(`/api/photo/${currentPhoto.id}/tags/${t.id}`, { method: 'DELETE' });
          loadPhotoTags();
        });
        detailTags.appendChild(pill);
      });
    }

    // Close detail
    document.getElementById('close-detail').addEventListener('click', () => {
      overlay.classList.remove('active');
      loadPhotos(); // Refresh grid to show updated ratings
    });
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.classList.remove('active');
        loadPhotos();
      }
    });

    // Save caption
    document.getElementById('save-caption').addEventListener('click', async () => {
      await fetch(`/api/photo/${currentPhoto.id}/caption`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ caption: captionInput.value })
      });
    });

    // Rating buttons
    document.querySelectorAll('.rating-section button').forEach(btn => {
      btn.addEventListener('click', async () => {
        const rating = btn.dataset.rating || null;
        await fetch(`/api/photo/${currentPhoto.id}/rating`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ rating })
        });
        currentPhoto.rating = rating;
        document.querySelectorAll('.rating-section button').forEach(b => {
          b.classList.toggle('active', b.dataset.rating === (rating || ''));
        });
      });
    });

    // Add tag
    document.getElementById('add-tag-btn').addEventListener('click', async () => {
      const name = tagInput.value.trim();
      if (!name) return;
      // Create or find tag
      const res = await fetch('/api/tags', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const tag = await res.json();
      // Assign to photo
      await fetch(`/api/photo/${currentPhoto.id}/tags`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tag_id: tag.id })
      });
      tagInput.value = '';
      loadPhotoTags();
      loadAllTags();
    });

    // Filters — folder and group are mutually exclusive
    folderSelect.addEventListener('change', () => {
      if (folderSelect.value) {
        activeSource = 'folder';
        groupSelect.value = '';
      } else {
        activeSource = null;
      }
      loadPhotos();
    });
    groupSelect.addEventListener('change', () => {
      if (groupSelect.value) {
        activeSource = 'group';
        folderSelect.value = '';
      } else {
        activeSource = null;
      }
      loadPhotos();
    });
    filterRating.addEventListener('change', renderGrid);
    filterTag.addEventListener('change', renderGrid);

    // --- Lightbox ---
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCounter = document.getElementById('lb-counter');
    let lbIndex = 0;
    let lbList = []; // filtered photo list at time of open

    function openLightbox(index) {
      // Use the currently rendered filtered list
      lbList = getCurrentFilteredList();
      lbIndex = index;
      showLbPhoto();
      lightbox.classList.add('active');
      overlay.classList.remove('active'); // close detail modal
    }

    function getCurrentFilteredList() {
      // Re-derive from current photos + filters (sync path only)
      const ratingFilter = filterRating.value;
      let filtered = photos;
      if (ratingFilter === 'unrated') filtered = filtered.filter(p => !p.rating);
      else if (ratingFilter) filtered = filtered.filter(p => p.rating === ratingFilter);
      return filtered;
    }

    function showLbPhoto() {
      if (lbList.length === 0) return;
      lbImg.src = `/api/photo/${lbList[lbIndex].id}`;
      lbCounter.textContent = `${lbIndex + 1} / ${lbList.length}`;
    }

    function lbNav(dir) {
      if (lbList.length === 0) return;
      lbIndex = (lbIndex + dir + lbList.length) % lbList.length;
      showLbPhoto();
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => lbNav(-1));
    document.getElementById('lb-next').addEventListener('click', () => lbNav(1));

    // Click detail image to open lightbox
    detailImg.style.cursor = 'pointer';
    detailImg.addEventListener('click', () => {
      if (!currentPhoto) return;
      const list = getCurrentFilteredList();
      const idx = list.findIndex(p => p.id === currentPhoto.id);
      openLightbox(idx >= 0 ? idx : 0);
    });

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') lbNav(-1);
      else if (e.key === 'ArrowRight') lbNav(1);
    });

    // Click background to close
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // --- Multi-select ---
    const selectedIds = new Set();
    const selectionToolbar = document.getElementById('selection-toolbar');
    const selCount = document.getElementById('sel-count');
    const selectAllCb = document.getElementById('select-all-cb');

    function updateSelectionUI() {
      const n = selectedIds.size;
      selCount.textContent = `${n} selected`;
      selectionToolbar.classList.toggle('active', n > 0);
      if (n === 0) selectionToolbar.style.display = 'none';
      else selectionToolbar.style.display = 'flex';
      // sync select-all checkbox
      const cards = grid.querySelectorAll('.photo-card');
      selectAllCb.checked = cards.length > 0 && selectedIds.size === cards.length;
    }

    function toggleSelect(id, card, cb) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
        card.classList.remove('selected');
        cb.checked = false;
      } else {
        selectedIds.add(id);
        card.classList.add('selected');
        cb.checked = true;
      }
      updateSelectionUI();
    }

    selectAllCb.addEventListener('change', () => {
      const cards = grid.querySelectorAll('.photo-card');
      cards.forEach(card => {
        const id = Number(card.dataset.photoId);
        const cb = card.querySelector('.select-cb');
        if (selectAllCb.checked) {
          selectedIds.add(id);
          card.classList.add('selected');
          if (cb) cb.checked = true;
        } else {
          selectedIds.delete(id);
          card.classList.remove('selected');
          if (cb) cb.checked = false;
        }
      });
      updateSelectionUI();
    });

    document.getElementById('btn-deselect-all').addEventListener('click', () => {
      selectedIds.clear();
      grid.querySelectorAll('.photo-card').forEach(c => {
        c.classList.remove('selected');
        const cb = c.querySelector('.select-cb');
        if (cb) cb.checked = false;
      });
      selectAllCb.checked = false;
      updateSelectionUI();
    });

    // --- File ops (detail modal) ---
    const fileopStatus = document.getElementById('fileops-status');

    document.getElementById('btn-rename').addEventListener('click', async () => {
      if (!currentPhoto) return;
      const stem = currentPhoto.filename.replace(/\.[^.]+$/, '');
      const newName = prompt('New filename (without extension):', stem);
      if (!newName || newName === stem) return;
      fileopStatus.textContent = 'Renaming...';
      const res = await fetch(`/api/photo/${currentPhoto.id}/rename`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ newName })
      });
      const data = await res.json();
      if (data.ok) {
        currentPhoto.filename = data.filename;
        currentPhoto.original_path = data.original_path;
        detailFilename.textContent = data.filename;
        fileopStatus.textContent = 'Renamed successfully';
      } else {
        fileopStatus.textContent = 'Error: ' + (data.error || 'rename failed');
        fileopStatus.style.color = '#c0392b';
      }
      setTimeout(() => { fileopStatus.textContent = ''; fileopStatus.style.color = '#27ae60'; }, 3000);
    });

    document.getElementById('btn-convert-png').addEventListener('click', async () => {
      if (!currentPhoto) return;
      fileopStatus.textContent = 'Converting to PNG...';
      const res = await fetch(`/api/photo/${currentPhoto.id}/convert-png`, { method: 'POST' });
      const data = await res.json();
      if (data.ok) {
        fileopStatus.textContent = `PNG created (${data.width}x${data.height})`;
      } else {
        fileopStatus.textContent = 'Error: ' + (data.error || 'convert failed');
        fileopStatus.style.color = '#c0392b';
      }
      setTimeout(() => { fileopStatus.textContent = ''; fileopStatus.style.color = '#27ae60'; }, 3000);
    });

    async function doResize(mode) {
      if (!currentPhoto) return;
      fileopStatus.textContent = `Resizing (${mode})...`;
      const res = await fetch(`/api/photo/${currentPhoto.id}/resize`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mode })
      });
      const data = await res.json();
      if (data.ok) {
        const parts = [];
        data.results.forEach(r => parts.push(`${r.mode}: ${r.width}x${r.height}`));
        data.skipped.forEach(s => parts.push(`${s.mode}: skipped (${s.reason})`));
        fileopStatus.textContent = parts.join(' | ');
      } else {
        fileopStatus.textContent = 'Error: ' + (data.error || 'resize failed');
        fileopStatus.style.color = '#c0392b';
      }
      setTimeout(() => { fileopStatus.textContent = ''; fileopStatus.style.color = '#27ae60'; }, 5000);
    }

    document.getElementById('btn-resize-print').addEventListener('click', () => doResize('print'));
    document.getElementById('btn-resize-screen').addEventListener('click', () => doResize('screen'));
    document.getElementById('btn-resize-both').addEventListener('click', () => doResize('both'));

    // --- Move to folder ---
    const folderPickerOverlay = document.getElementById('folder-picker-overlay');
    const folderPathInput = document.getElementById('folder-path-input');
    const folderListEl = document.getElementById('folder-list');

    document.getElementById('btn-move-selected').addEventListener('click', async () => {
      if (selectedIds.size === 0) return;
      // Populate folder list from known folders
      folderListEl.innerHTML = '';
      const res = await fetch('/api/folders');
      const folders = await res.json();
      folders.forEach(f => {
        const div = document.createElement('div');
        div.className = 'folder-option';
        div.textContent = f.source_folder;
        div.addEventListener('click', () => { folderPathInput.value = f.source_folder; });
        folderListEl.appendChild(div);
      });
      folderPathInput.value = '';
      folderPickerOverlay.classList.add('active');
    });

    document.getElementById('folder-picker-cancel').addEventListener('click', () => {
      folderPickerOverlay.classList.remove('active');
    });

    document.getElementById('folder-picker-confirm').addEventListener('click', async () => {
      const target = folderPathInput.value.trim();
      if (!target) return;
      const ids = Array.from(selectedIds);
      const res = await fetch('/api/photos/move', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fileIds: ids, targetFolder: target })
      });
      const data = await res.json();
      folderPickerOverlay.classList.remove('active');
      selectedIds.clear();
      updateSelectionUI();
      selectAllCb.checked = false;
      loadPhotos();
      // Refresh folder list in case new folder appeared
      const folderRes = await fetch('/api/folders');
      const newFolders = await folderRes.json();
      // Re-populate folder select (keep first two options)
      while (folderSelect.options.length > 2) folderSelect.remove(2);
      newFolders.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f.source_folder;
        opt.textContent = `${f.source_folder} (${f.count})`;
        folderSelect.appendChild(opt);
      });
    });

    // --- Add to group ---
    const groupPickerOverlay = document.getElementById('group-picker-overlay');
    const groupListEl = document.getElementById('group-list');
    const newGroupInput = document.getElementById('new-group-input');
    let selectedGroupId = null;

    document.getElementById('btn-add-to-group').addEventListener('click', async () => {
      if (selectedIds.size === 0) return;
      selectedGroupId = null;
      newGroupInput.value = '';
      // Populate group list
      groupListEl.innerHTML = '';
      const res = await fetch('/api/groups');
      const groups = await res.json();
      groups.forEach(g => {
        const div = document.createElement('div');
        div.className = 'group-option';
        div.textContent = `${g.name} (${g.member_count})`;
        div.addEventListener('click', () => {
          groupListEl.querySelectorAll('.group-option').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          selectedGroupId = g.id;
        });
        groupListEl.appendChild(div);
      });
      groupPickerOverlay.classList.add('active');
    });

    document.getElementById('btn-create-group-inline').addEventListener('click', async () => {
      const name = newGroupInput.value.trim();
      if (!name) return;
      const res = await fetch('/api/groups', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const created = await res.json();
      if (created.id) {
        selectedGroupId = created.id;
        // Add to list and select it
        const div = document.createElement('div');
        div.className = 'group-option selected';
        div.textContent = `${created.name} (0)`;
        groupListEl.querySelectorAll('.group-option').forEach(el => el.classList.remove('selected'));
        groupListEl.prepend(div);
        div.addEventListener('click', () => {
          groupListEl.querySelectorAll('.group-option').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          selectedGroupId = created.id;
        });
        newGroupInput.value = '';
        loadGroups(); // refresh header dropdown
      }
    });

    document.getElementById('group-picker-cancel').addEventListener('click', () => {
      groupPickerOverlay.classList.remove('active');
    });

    document.getElementById('group-picker-confirm').addEventListener('click', async () => {
      if (!selectedGroupId) return;
      const ids = Array.from(selectedIds);
      await fetch(`/api/groups/${selectedGroupId}/photos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ file_ids: ids })
      });
      groupPickerOverlay.classList.remove('active');
      selectedIds.clear();
      updateSelectionUI();
      selectAllCb.checked = false;
      loadGroups(); // refresh counts
    });

    // Init
    loadFolders();
    loadGroups();
    loadAllTags();
  </script>
</body>
</html>
