      lbFilesize.textContent = '';
      const q = p.id ? `id=${p.id}` : `path=${encodeURIComponent(p.disk_path)}`;
      fetch(`/api/file-size?${q}`).then(r => r.json()).then(d => {
        if (lbList[lbIndex] === p && d.size) lbFilesize.textContent = formatFileSize(d.size);
      }).catch(() => {});
    }

    function lbNav(dir) {
      if (lbList.length === 0) return;
      lbIndex = (lbIndex + dir + lbList.length) % lbList.length;
      showLbPhoto();
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      if (currentPhoto) overlay.classList.add('active');
    }

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => lbNav(-1));
    document.getElementById('lb-next').addEventListener('click', () => lbNav(1));

    // Click detail image to open lightbox (canvas is on top, so this is fallback)
    detailImg.style.cursor = 'pointer';
    detailImg.addEventListener('click', () => {
      if (faceDrawMode) return;
      if (!currentPhoto) return;
      const list = getCurrentFilteredList();
      const idx = list.findIndex(p => p.id === currentPhoto.id);
      openLightbox(idx >= 0 ? idx : 0);
    });

    // --- Zoom ---
    const viewport = document.getElementById('detail-img-viewport');
    const zoomLevelEl = document.getElementById('zoom-level');
    let zoomScale = 0; // 0 = fit mode
    const ZOOM_STEPS = [0.25, 0.5, 0.75, 1, 1.5, 2, 3, 4];

    function getFitScale() {
      const img = detailImg;
      if (!img.naturalWidth) return 1;
      const maxW = viewport.clientWidth || 868;
      const maxH = 512;
      return Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
    }

    function applyZoom(centerOnMouse) {
      const wrap = document.getElementById('detail-img-wrap');
      const img = detailImg;
      if (!img.naturalWidth) return;
      const effectiveScale = zoomScale || getFitScale();
      const w = img.naturalWidth * effectiveScale;
      const h = img.naturalHeight * effectiveScale;
      img.style.width = w + 'px';
      img.style.height = h + 'px';
      wrap.style.width = w + 'px';
      wrap.style.height = h + 'px';
      zoomLevelEl.textContent = zoomScale ? Math.round(effectiveScale * 100) + '%' : 'Fit';
      resizeFaceCanvas();
      drawFaceRects();
    }

    function zoomIn() {
      const cur = zoomScale || getFitScale();
      const next = ZOOM_STEPS.find(s => s > cur + 0.01);
      if (next) { zoomScale = next; applyZoom(); }
    }

    function zoomOut() {
      const cur = zoomScale || getFitScale();
      const prev = [...ZOOM_STEPS].reverse().find(s => s < cur - 0.01);
      if (prev) { zoomScale = prev; applyZoom(); }
    }

    function zoomReset() {
      zoomScale = 0;
      applyZoom();
      viewport.scrollTop = 0;
      viewport.scrollLeft = 0;
    }

    document.getElementById('zoom-in').addEventListener('click', zoomIn);
    document.getElementById('zoom-out').addEventListener('click', zoomOut);
    document.getElementById('zoom-reset').addEventListener('click', zoomReset);

    // Mouse wheel zoom (Ctrl+wheel or just wheel on viewport)
    viewport.addEventListener('wheel', (e) => {
      if (!e.ctrlKey) return;
      e.preventDefault();
      // Zoom toward cursor position
      const rect = viewport.getBoundingClientRect();
      const mx = e.clientX - rect.left + viewport.scrollLeft;
      const my = e.clientY - rect.top + viewport.scrollTop;
      const oldScale = zoomScale || getFitScale();

      if (e.deltaY < 0) zoomIn(); else zoomOut();

      const newScale = zoomScale || getFitScale();
      if (newScale !== oldScale) {
        const ratio = newScale / oldScale;
        viewport.scrollLeft = mx * ratio - (e.clientX - rect.left);
        viewport.scrollTop = my * ratio - (e.clientY - rect.top);
      }
    }, { passive: false });

    // Pan with middle-click drag or grab cursor
    let isPanning = false, panStartX = 0, panStartY = 0, panScrollX = 0, panScrollY = 0;
    viewport.addEventListener('mousedown', (e) => {
      // Don't pan if clicking on canvas in faces mode (drawing) or on picker
      if (e.target.closest('#face-picker')) return;
      if (e.button === 1 || (e.button === 0 && !facesMode && zoomScale)) {
        isPanning = true;
        panStartX = e.clientX; panStartY = e.clientY;
        panScrollX = viewport.scrollLeft; panScrollY = viewport.scrollTop;
        e.preventDefault();
      }
    });
    document.addEventListener('mousemove', (e) => {
      if (!isPanning) return;
      viewport.scrollLeft = panScrollX - (e.clientX - panStartX);
      viewport.scrollTop = panScrollY - (e.clientY - panStartY);
    });
    document.addEventListener('mouseup', () => { isPanning = false; });

    // Reset zoom when switching photos
    detailImg.addEventListener('load', () => {
      zoomScale = 0;
      setTimeout(() => {
        applyZoom();
      }, 50);
    });

    // --- Face Region Drawing & Click-to-Highlight ---
    const faceCanvas = document.getElementById('face-canvas');
    const faceCtx = faceCanvas.getContext('2d');
    const tagFaceBtn = document.getElementById('tag-face-btn');
    const facePicker = document.getElementById('face-picker');
    const facePickerInput = document.getElementById('face-picker-input');
    const fpMatches = document.getElementById('fp-matches');
    const fpIdentifyBtn = document.getElementById('fp-identify-btn');
    const fpIdentifyResults = document.getElementById('fp-identify-results');
    const fpIdMatches = document.getElementById('fp-id-matches');
    const fpBackLink = document.getElementById('fp-back-link');
    const detailImgWrap = document.getElementById('detail-img-wrap');

    let faceDrawForPpId = null; // if drawing for a specific existing person-row (locate mode)
    let faceDrawRect = null; // {x,y,w,h} in canvas pixels during draw
    let faceDrawing = false;
    let faceStartX = 0, faceStartY = 0;

    function resizeFaceCanvas() {
      // Match canvas to the rendered image size
      const img = detailImg;
      faceCanvas.width = img.clientWidth;
      faceCanvas.height = img.clientHeight;
      // Position canvas exactly over the image
      faceCanvas.style.width = img.clientWidth + 'px';
      faceCanvas.style.height = img.clientHeight + 'px';
      faceCanvas.style.top = img.offsetTop + 'px';
      faceCanvas.style.left = img.offsetLeft + 'px';
    }

    function drawFaceRects() {
      const cw = faceCanvas.width, ch = faceCanvas.height;
      faceCtx.clearRect(0, 0, cw, ch);
      if (!currentPhotoPeople || cw === 0 || ch === 0) return;

      // We need to map fractional coords to canvas coords.
      // The image might be letterboxed via object-fit:contain.
      // Since the canvas matches img.clientWidth/Height and the wrapper
      // uses inline-block + display:flex justify center, the canvas
      // and the image rendered area are the same.
      // But object-fit:contain may leave bars. We need the actual
      // drawn area within the img element.
      const nat = { w: detailImg.naturalWidth, h: detailImg.naturalHeight };
      if (!nat.w || !nat.h) return;
      const scale = Math.min(cw / nat.w, ch / nat.h);
      const drawW = nat.w * scale, drawH = nat.h * scale;
      const offX = (cw - drawW) / 2, offY = (ch - drawH) / 2;

      currentPhotoPeople.forEach((pp, i) => {
        if (pp.x == null || pp.y == null || pp.w == null || pp.h == null) return;
        const color = FACE_COLORS[i % FACE_COLORS.length];
        const rx = offX + pp.x * drawW;
        const ry = offY + pp.y * drawH;
        const rw = pp.w * drawW;
        const rh = pp.h * drawH;

        faceCtx.strokeStyle = color;
        faceCtx.lineWidth = 2;
        faceCtx.strokeRect(rx, ry, rw, rh);
        faceCtx.fillStyle = hexToRgba(color, 0.15);
        faceCtx.fillRect(rx, ry, rw, rh);

        // Label
        const label = pp.name || '';
        if (label) {
          faceCtx.font = '12px -apple-system, sans-serif';
          const tw = faceCtx.measureText(label).width;
          faceCtx.fillStyle = 'rgba(0,0,0,0.7)';
          faceCtx.fillRect(rx, ry - 18, tw + 8, 18);
          faceCtx.fillStyle = color;
          faceCtx.fillText(label, rx + 4, ry - 5);
        }
      });

      // Draw in-progress rectangle
      if (faceDrawRect) {
        faceCtx.strokeStyle = '#fff';
        faceCtx.lineWidth = 2;
        faceCtx.setLineDash([5, 3]);
        faceCtx.strokeRect(faceDrawRect.x, faceDrawRect.y, faceDrawRect.w, faceDrawRect.h);
        faceCtx.setLineDash([]);
      }
    }

    function hexToRgba(hex, alpha) {
      hex = hex.replace('#', '');
      const r = parseInt(hex.substring(0, 2), 16);
      const g = parseInt(hex.substring(2, 4), 16);
      const b = parseInt(hex.substring(4, 6), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    // Convert canvas pixel coords to fractional image coords (0-1)
    function canvasToFrac(cx, cy) {
      const cw = faceCanvas.width, ch = faceCanvas.height;
      const nat = { w: detailImg.naturalWidth, h: detailImg.naturalHeight };
      const scale = Math.min(cw / nat.w, ch / nat.h);
      const drawW = nat.w * scale, drawH = nat.h * scale;
      const offX = (cw - drawW) / 2, offY = (ch - drawH) / 2;
      return { x: (cx - offX) / drawW, y: (cy - offY) / drawH };
    }

    // --- Faces toggle button ---
    tagFaceBtn.addEventListener('click', () => {
      if (faceDrawMode) {
        // If actively drawing, just cancel the draw
        exitDrawMode();
        return;
      }
      toggleFacesMode();
    });

    function toggleFacesMode(forceOn) {
      facesMode = forceOn != null ? forceOn : !facesMode;
      tagFaceBtn.classList.toggle('active', facesMode);
      faceCanvas.classList.toggle('faces-on', facesMode);
      if (facesMode) {
        resizeFaceCanvas();
        drawFaceRects();
      } else {
        exitDrawMode();
      }
      loadPhotoPeople(); // re-render sidebar with/without dots & locate
    }

    function enterDrawMode(ppId) {
      if (!currentPhoto || !currentPhoto.id) return;
      if (!facesMode) toggleFacesMode(true);
      faceDrawMode = true;
      faceDrawForPpId = ppId || null;
      faceCanvas.classList.add('draw-mode');
      faceDrawRect = null;
      closeFacePicker();
    }

    function exitDrawMode() {
      faceDrawMode = false;
      faceDrawForPpId = null;
      faceDrawRect = null;
      faceDrawing = false;
      faceCanvas.classList.remove('draw-mode');
      closeFacePicker();
      drawFaceRects();
    }

    // Canvas mouse events -- in faces mode, drag to draw
    faceCanvas.addEventListener('mousedown', (e) => {
      if (!facesMode) return;
      closeFacePicker();
      const rect = faceCanvas.getBoundingClientRect();
      faceStartX = e.clientX - rect.left;
      faceStartY = e.clientY - rect.top;
      faceDrawing = true;
      faceDrawRect = { x: faceStartX, y: faceStartY, w: 0, h: 0 };
    });

    faceCanvas.addEventListener('mousemove', (e) => {
      if (!faceDrawing) return;
      const rect = faceCanvas.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      faceDrawRect = {
        x: Math.min(faceStartX, mx),
        y: Math.min(faceStartY, my),
        w: Math.abs(mx - faceStartX),
        h: Math.abs(my - faceStartY)
      };
      drawFaceRects();
    });

    faceCanvas.addEventListener('mouseup', (e) => {
      if (!faceDrawing) return;
      faceDrawing = false;
      if (!faceDrawRect || faceDrawRect.w < 5 || faceDrawRect.h < 5) {
        // Too small -- treat as a click (check for existing rect)
        faceDrawRect = null;
        handleFaceClick(e);
        drawFaceRects();
        return;
      }
      // Convert to fractional coords
      const tl = canvasToFrac(faceDrawRect.x, faceDrawRect.y);
      const br = canvasToFrac(faceDrawRect.x + faceDrawRect.w, faceDrawRect.y + faceDrawRect.h);
      const fracRect = { x: tl.x, y: tl.y, w: br.x - tl.x, h: br.y - tl.y };

      if (faceDrawForPpId) {
        // Locate mode: update existing photo_people record
        saveFaceCoords(faceDrawForPpId, fracRect);
      } else {
        // Show person picker near the drawn rect
        showFacePicker(faceDrawRect, fracRect);
      }
    });

    // Click on canvas in faces mode: check face rects (click-to-highlight)
    // Note: drag-to-draw is handled by mousedown/up, click only fires for non-drag
    faceCanvas.addEventListener('click', (e) => {
      if (!facesMode || !currentPhoto) return;
      // mouseup already handled large drags; clicks land here
      // checkFaceClickAndHighlight is called from handleFaceClick in mouseup for small drags
    });

    function checkFaceClickAndHighlight(e) {
      const rect = faceCanvas.getBoundingClientRect();
      const cx = e.clientX - rect.left;
      const cy = e.clientY - rect.top;
      const cw = faceCanvas.width, ch = faceCanvas.height;
      const nat = { w: detailImg.naturalWidth, h: detailImg.naturalHeight };
      if (!nat.w || !nat.h) return false;
      const scale = Math.min(cw / nat.w, ch / nat.h);
      const drawW = nat.w * scale, drawH = nat.h * scale;
      const offX = (cw - drawW) / 2, offY = (ch - drawH) / 2;
      for (const pp of currentPhotoPeople) {
        if (pp.x == null) continue;
        const rx = offX + pp.x * drawW, ry = offY + pp.y * drawH;
        const rw = pp.w * drawW, rh = pp.h * drawH;
        if (cx >= rx && cx <= rx + rw && cy >= ry && cy <= ry + rh) {
          highlightPersonRow(pp.id);
          return true;
        }
      }
      return false;
    }

    function handleFaceClick(e) {
      checkFaceClickAndHighlight(e);
    }

    function highlightPersonRow(ppId) {
      const rows = peopleList.querySelectorAll('.person-row');
      rows.forEach(row => {
        if (row.dataset.ppId == ppId) {
          row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          row.classList.remove('flash');
          void row.offsetWidth; // force reflow
          row.classList.add('flash');
          setTimeout(() => row.classList.remove('flash'), 1500);
        }
      });
    }

    // --- Face person picker ---
    function showFacePicker(canvasRect, fracRect) {
      facePicker.classList.add('open');
      currentFracRect = fracRect;
      // Position near the drawn rectangle
      facePicker.style.left = Math.min(canvasRect.x + canvasRect.w + 5, faceCanvas.width - 210) + 'px';
      facePicker.style.top = canvasRect.y + 'px';
      facePickerInput.value = '';
      facePickerInput.focus();
      // Reset identify state
      fpIdentifyResults.classList.remove('open');
      fpIdMatches.innerHTML = '';
      facePickerInput.style.display = '';
      fpMatches.style.display = '';
      renderFacePickerMatches(fracRect);

      facePickerInput.oninput = () => renderFacePickerMatches(fracRect);
    }

    let facePickerBusy = false;

    function renderFacePickerMatches(fracRect) {
      const q = facePickerInput.value.trim().toLowerCase();
      fpMatches.innerHTML = '';
      if (!q) return;
      const hits = allPeople.filter(p => p.name.toLowerCase().includes(q)).slice(0, 10);
      hits.forEach(person => {
        const div = document.createElement('div');
        div.className = 'fp-match';
        div.textContent = person.name;
        div.addEventListener('mousedown', async (e) => {
          e.preventDefault();
          if (facePickerBusy) return;
          facePickerBusy = true;
          await assignFacePerson(person.id, fracRect);
        });
        fpMatches.appendChild(div);
      });
      // Create option
      if (q && !hits.some(p => p.name.toLowerCase() === q)) {
        const div = document.createElement('div');
        div.className = 'fp-create';
        div.textContent = `+ Create "${facePickerInput.value.trim()}"`;
        div.addEventListener('mousedown', async (e) => {
          e.preventDefault();
          if (facePickerBusy) return;
          facePickerBusy = true;
          const res = await fetch('/api/people', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: facePickerInput.value.trim() })
          });
          const created = await res.json();
          await loadAllPeople();
          await assignFacePerson(created.id, fracRect);
        });
        fpMatches.appendChild(div);
      }
    }

    async function assignFacePerson(personId, fracRect) {
      if (!currentPhoto || !currentPhoto.id) return;
      await fetch(`/api/photo/${currentPhoto.id}/people`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ person_id: personId, x: fracRect.x, y: fracRect.y, w: fracRect.w, h: fracRect.h })
      });
      closeFacePicker();
      exitDrawMode();
      facePickerBusy = false;
      await loadPhotoPeople();
    }

    async function saveFaceCoords(ppId, fracRect) {
      await fetch(`/api/photo-people/${ppId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ x: fracRect.x, y: fracRect.y, w: fracRect.w, h: fracRect.h })
      });
      exitDrawMode();
      await loadPhotoPeople();
    }

    function closeFacePicker() {
      facePicker.classList.remove('open');
      facePickerInput.value = '';
      fpMatches.innerHTML = '';
      fpIdentifyResults.classList.remove('open');
      fpIdMatches.innerHTML = '';
      facePickerInput.style.display = '';
      fpMatches.style.display = '';
      faceDrawRect = null;
      facePickerBusy = false;
    }

    // --- Face identification ---
    let currentFracRect = null;

    fpIdentifyBtn.addEventListener('click', async () => {
      if (!currentPhoto || !currentFracRect) return;
      fpIdentifyBtn.disabled = true;
      fpIdentifyBtn.textContent = 'Scanning...';
      try {
        const res = await fetch(`/api/photo/${currentPhoto.id}/identify`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(currentFracRect)
        });
        const data = await res.json();
        showIdentifyResults(data);
      } catch (err) {
        console.error('identify error:', err);
      } finally {
        fpIdentifyBtn.disabled = false;
        fpIdentifyBtn.textContent = 'Identify';
      }
    });

    function showIdentifyResults(data) {
      fpIdMatches.innerHTML = '';
      if (!data.descriptor_found) {
        fpIdMatches.innerHTML = '<div style="font-size:0.8rem;color:var(--text-dim);padding:0.3rem;">No face detected in selection</div>';
      } else if (data.matches.length === 0) {
        fpIdMatches.innerHTML = '<div style="font-size:0.8rem;color:var(--text-dim);padding:0.3rem;">No reference faces to compare</div>';
      } else {
        const filtered = data.matches.filter(m => m.distance < 0.8);
        if (filtered.length === 0) {
          fpIdMatches.innerHTML = '<div style="font-size:0.8rem;color:var(--text-dim);padding:0.3rem;">No close matches found</div>';
        } else {
          filtered.forEach(m => {
            const div = document.createElement('div');
            div.className = 'fp-id-match';
            const color = m.distance < 0.5 ? '#27ae60' : m.distance < 0.6 ? '#f39c12' : '#888';
            const pct = Math.max(0, Math.round((1 - m.distance) * 100));
            div.innerHTML = `
              <span style="flex:1">${m.name}</span>
              <div class="fp-conf-bar"><div class="fp-conf-fill" style="width:${pct}%;background:${color}"></div></div>
              <span class="fp-dist">${m.distance.toFixed(2)}</span>
            `;
            div.addEventListener('mousedown', async (e) => {
              e.preventDefault();
              if (facePickerBusy) return;
              facePickerBusy = true;
              await assignFacePerson(m.person_id, currentFracRect);
            });
            fpIdMatches.appendChild(div);
          });
        }
      }
      // Show results, hide search
      fpIdentifyResults.classList.add('open');
      facePickerInput.style.display = 'none';
      fpMatches.style.display = 'none';
    }

    fpBackLink.addEventListener('click', () => {
      fpIdentifyResults.classList.remove('open');
      fpIdMatches.innerHTML = '';
      facePickerInput.style.display = '';
      fpMatches.style.display = '';
      facePickerInput.focus();
    });

    // Keyboard nav
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && faceDrawMode) {
        exitDrawMode();
        return;
      }
      if (e.key === 'Escape' && facePicker.classList.contains('open')) {
        closeFacePicker();
        return;
      }
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      else if (e.key === 'ArrowLeft') lbNav(-1);
      else if (e.key === 'ArrowRight') lbNav(1);
    });

    // Click lightbox image or background to close back to detail
    lbImg.style.cursor = 'pointer';
    lbImg.addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // --- Multi-select ---
    const selectedIds = new Set();
    const selectionToolbar = document.getElementById('selection-toolbar');
    const selCount = document.getElementById('sel-count');
    const selectAllCb = document.getElementById('select-all-cb');

    function updateSelectionUI() {
      const n = selectedIds.size;
      selCount.textContent = `${n} selected`;
      selectionToolbar.classList.toggle('active', n > 0);
      if (n === 0) selectionToolbar.style.display = 'none';
      else selectionToolbar.style.display = 'flex';
      // sync select-all checkbox
      const cards = grid.querySelectorAll('.photo-card');
      selectAllCb.checked = cards.length > 0 && selectedIds.size === cards.length;
    }

    function toggleSelect(id, card, cb) {
      if (selectedIds.has(id)) {
        selectedIds.delete(id);
        card.classList.remove('selected');
        cb.checked = false;
      } else {
        selectedIds.add(id);
        card.classList.add('selected');
        cb.checked = true;
      }
      updateSelectionUI();
    }

    selectAllCb.addEventListener('change', () => {
      const cards = grid.querySelectorAll('.photo-card');
      cards.forEach(card => {
        const id = Number(card.dataset.photoId);
        const cb = card.querySelector('.select-cb');
        if (selectAllCb.checked) {
          selectedIds.add(id);
          card.classList.add('selected');
          if (cb) cb.checked = true;
        } else {
          selectedIds.delete(id);
          card.classList.remove('selected');
          if (cb) cb.checked = false;
        }
      });
      updateSelectionUI();
    });

    document.getElementById('btn-deselect-all').addEventListener('click', () => {
      selectedIds.clear();
      grid.querySelectorAll('.photo-card').forEach(c => {
        c.classList.remove('selected');
        const cb = c.querySelector('.select-cb');
        if (cb) cb.checked = false;
      });
      selectAllCb.checked = false;
      updateSelectionUI();
    });

    // --- Add to group ---
    const groupPickerOverlay = document.getElementById('group-picker-overlay');
    const groupListEl = document.getElementById('group-list');
    const newGroupInput = document.getElementById('new-group-input');
    let selectedGroupId = null;

    document.getElementById('btn-add-to-group').addEventListener('click', async () => {
      if (selectedIds.size === 0) return;
      selectedGroupId = null;
      newGroupInput.value = '';
      // Populate group list
      groupListEl.innerHTML = '';
      const res = await fetch('/api/groups');
      const groups = await res.json();
      groups.forEach(g => {
        const div = document.createElement('div');
        div.className = 'group-option';
        div.textContent = `${g.name} (${g.member_count})`;
        div.addEventListener('click', () => {
          groupListEl.querySelectorAll('.group-option').forEach(el => el.classList.remove('selected'));
          div.classList.add('selected');
          selectedGroupId = g.id;
        });
        groupListEl.appendChild(div);
      });
      groupPickerOverlay.classList.add('active');
    });

    document.getElementById('btn-create-group-inline').addEventListener('click', async () => {
      const name = newGroupInput.value.trim();
      if (!name) return;
      const res = await fetch('/api/groups', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name })
      });
      const created = await res.json();
      if (created.id) {
        selectedGroupId = created.id;
        // Add to list and select it
        const div = document.createElement('div');
        div.className = 'group-option selected';

        const curBase = img.getAttribute('src').replace(/[?&]_t=\d+/, '').split('?')[0];

        }
      });

    // --- Doc entity linking (combo helper for document overlay) ---
    function setupDocCombo({ inputId, matchesId, listEl, allItemsFn, loadFn, linkUrl, idKey, createUrl }) {
      const input = document.getElementById(inputId);
      const matchesEl = document.getElementById(matchesId);
      let busy = false;

      function render() {
        const q = input.value.trim().toLowerCase();
        matchesEl.innerHTML = '';
        if (!q) { matchesEl.classList.remove('open'); return; }
        const hits = allItemsFn().filter(item => item.name.toLowerCase().includes(q));
        hits.forEach(item => {
          const div = document.createElement('div');
          div.className = 'combo-match';
          div.textContent = item.name;
          div.addEventListener('mousedown', async (e) => {
            e.preventDefault();
            if (busy || !currentDocument) return;
            busy = true;
            await fetch(linkUrl(currentDocument.id), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ [idKey]: item.id })
            });
            input.value = '';
            matchesEl.classList.remove('open');
            busy = false;
            loadFn();
          });
          matchesEl.appendChild(div);
        });
        const exact = hits.some(item => item.name.toLowerCase() === q);
        if (!exact && createUrl) {
          const div = document.createElement('div');
          div.className = 'combo-create';
          div.textContent = `+ Create "${input.value.trim()}"`;
          div.addEventListener('mousedown', async (e) => {
            e.preventDefault();
            if (busy || !currentDocument) return;
            busy = true;
            const res = await fetch(createUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ name: input.value.trim() })
            });
            const created = await res.json();
            await fetch(linkUrl(currentDocument.id), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ [idKey]: created.id })
            });
            input.value = '';
            matchesEl.classList.remove('open');
            busy = false;
            await loadAllSidebar();
            loadFn();
          });
          matchesEl.appendChild(div);
        }
        matchesEl.classList.add('open');
      }

      input.addEventListener('input', render);
      input.addEventListener('focus', render);
      input.addEventListener('blur', () => matchesEl.classList.remove('open'));
    }

    function relativeTime(ts) {
      const diff = Date.now() - new Date(ts).getTime();
      const secs = Math.floor(diff / 1000);
      if (secs < 60) return 'just now';
      const mins = Math.floor(secs / 60);
      if (mins < 60) return mins + ' min ago';
      const hrs = Math.floor(mins / 60);
      if (hrs < 24) return hrs + ' hr ago';
      const days = Math.floor(hrs / 24);
      if (days === 1) return 'yesterday';
      return days + ' days ago';
    }

    async function renderHBContent() {
      if (hbActiveTab === 'bookmarks') {
        const res = await fetch('/api/bookmarks');
        const bookmarks = await res.json();
        if (!bookmarks.length) { hbContent.innerHTML = '<div class="hb-empty">No bookmarks yet. Open a photo and click Bookmark.</div>'; return; }
        hbContent.innerHTML = bookmarks.map(b => `
          <div class="hb-entry">
            <span class="hb-icon">&#9733;</span>
            <div class="hb-info">
              <div class="hb-name">${b.name}</div>
              <div class="hb-sub">${b.source === 'disk' ? (b.folder || '').split('/').pop() : 'Group'}${b.photoFilename ? ' > ' + b.photoFilename : ''}</div>
            </div>
            <span class="hb-time">${relativeTime(b.ts)}</span>
            <button class="hb-go" data-source="${b.source}" data-folder="${b.folder || ''}" data-group-id="${b.groupId || ''}" data-photo-id="${b.photoId || ''}">Go</button>
            <button class="hb-del" data-id="${b.id}" title="Delete bookmark">&times;</button>
          </div>
        `).join('');
      } else {
        const res = await fetch('/api/history');
        const history = await res.json();
        if (!history.length) { hbContent.innerHTML = '<div class="hb-empty">No history yet. Browse some folders or groups.</div>'; return; }
        hbContent.innerHTML = history.map(h => `
          <div class="hb-entry" style="cursor:pointer;" data-source="${h.source}" data-folder="${h.folder || ''}" data-group-id="${h.groupId || ''}">
            <div class="hb-info">
              <div class="hb-name">${h.label || h.folder || 'Group ' + h.groupId}</div>
              <div class="hb-sub">${h.source === 'disk' ? 'Folder' : 'Group'}</div>
            </div>
            <span class="hb-time">${relativeTime(h.ts)}</span>
          </div>
        `).join('');
      }
    }

    function hbNavigate(source, folder, groupId, photoId) {
      hbOverlay.classList.remove('active');
      if (source === 'disk' && folder) {
        const label = folder.split('/').pop();
        selectFolder(folder, label);
      } else if (source === 'group' && groupId) {
        groupSelect.value = groupId;
        groupSelect.dispatchEvent(new Event('change'));
      }
      if (photoId) {
        // Wait for grid to load then open the photo
        setTimeout(() => {
          const photo = photos.find(p => p.id === parseInt(photoId));
          if (photo) openDetail(photo);
        }, 500);
      }
    }

    hbContent.addEventListener('click', (e) => {
      const goBtn = e.target.closest('.hb-go');
      if (goBtn) {
        hbNavigate(goBtn.dataset.source, goBtn.dataset.folder, goBtn.dataset.groupId, goBtn.dataset.photoId);
        return;
      }
      const delBtn = e.target.closest('.hb-del');
      if (delBtn) {
        fetch('/api/bookmarks/' + delBtn.dataset.id, { method: 'DELETE' }).then(() => renderHBContent());
        return;
      }
      const entry = e.target.closest('.hb-entry[data-source]');
      if (entry && hbActiveTab === 'history') {
        hbNavigate(entry.dataset.source, entry.dataset.folder, entry.dataset.groupId);
      }
    });

    document.querySelectorAll('.hb-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.hb-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        hbActiveTab = tab.dataset.tab;
        renderHBContent();
      });
    });

    headerHistoryBtn.addEventListener('click', () => {
      hbOverlay.classList.add('active');
      renderHBContent();
    });
    hbClose.addEventListener('click', () => hbOverlay.classList.remove('active'));
    document.getElementById('hb-home').addEventListener('click', (e) => {
      e.preventDefault();
      hbOverlay.classList.remove('active');
    });
    hbOverlay.addEventListener('click', (e) => { if (e.target === hbOverlay) hbOverlay.classList.remove('active'); });

    // Bookmark photo button
    document.getElementById('btn-bookmark-photo').addEventListener('click', () => {
      if (!currentPhoto) return;
      const defaultName = currentPhoto.filename || 'Untitled';
      const name = prompt('Bookmark name:', defaultName);
      if (!name) return;
      const body = { name, source: activeSource || 'disk', photoId: currentPhoto.id, photoFilename: currentPhoto.filename };
      if (activeSource === 'disk') body.folder = selectedFolder;
      else if (activeSource === 'group') body.groupId = parseInt(groupSelect.value);
      fetch('/api/bookmarks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    });

    // Init — load settings first (applies theme), then other data, then restore last location
    loadSettings().then(async () => {
      await loadGroups();
      loadAllTags();
      // Restore last location from history
      try {
        const res = await fetch('/api/history');
        const history = await res.json();
        if (history.length > 0) {
          const last = history[0];
          if (last.source === 'disk' && last.folder) {
            selectFolder(last.folder, last.label || last.folder.split('/').pop());
          } else if (last.source === 'group' && last.groupId) {
            groupSelect.value = last.groupId;
            groupSelect.dispatchEvent(new Event('change'));
          }
        }
      } catch (e) { /* no history yet */ }
    });
  </script>
</body>
</html>
